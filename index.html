<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darkwood Chronicles - 3D Horror</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .screen {
            display: none;
            height: 100vh;
            width: 100vw;
            position: absolute;
            top: 0;
            left: 0;
        }

        .screen.active {
            display: flex;
        }

        /* Main Menu */
        .menu-container {
            width: 100%;
            height: 100%;
            background-image: url('https://kommodo.ai/i/ouFPT0Zb7uzB4fTeS9dT');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #050505;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 1;
        }

        .menu-background {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 60px 80px;
            border-radius: 15px;
            border: 2px solid #4a4a4a;
            box-shadow: 0 0 40px rgba(139, 0, 0, 0.3), inset 0 0 60px rgba(0, 0, 0, 0.5);
            animation: pulse-border 4s ease-in-out infinite;
        }

        @keyframes pulse-border {
            0%, 100% { border-color: #4a4a4a; box-shadow: 0 0 40px rgba(139, 0, 0, 0.3); }
            50% { border-color: #8b0000; box-shadow: 0 0 60px rgba(139, 0, 0, 0.6); }
        }

        .game-title {
            font-size: 4em;
            color: #c9a959;
            text-shadow: 0 0 20px rgba(139, 0, 0, 0.8), 3px 3px 6px rgba(0, 0, 0, 0.9);
            margin-bottom: 10px;
            letter-spacing: 4px;
            animation: flicker 3s ease-in-out infinite alternate;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            41% { opacity: 1; }
            42% { opacity: 0.8; }
            43% { opacity: 1; }
            45% { opacity: 0.3; }
            46% { opacity: 1; }
        }

        .game-subtitle {
            font-size: 1.2em;
            color: #8a8a8a;
            margin-bottom: 50px;
            text-shadow: 0 0 10px rgba(139, 0, 0, 0.3);
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .menu-btn {
            width: 280px;
            padding: 15px 30px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #1a0a0a, #2a0a0a);
            color: #c9a959;
            border: 2px solid #8b0000;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(139, 0, 0, 0.5);
        }

        .menu-btn:hover {
            background: linear-gradient(135deg, #8b0000, #4a0000);
            color: #fff;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.7);
            border-color: #ff0000;
        }

        .menu-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
            border-color: #333;
        }

        .version-text {
            margin-top: 40px;
            color: #444;
            font-size: 0.9em;
        }

        /* Settings */
        .settings-container {
            width: 100%;
            max-width: 600px;
            margin: auto;
            background: rgba(5, 5, 5, 0.95);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #4a4a4a;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.2);
        }

        .settings-container h2 {
            color: #c9a959;
            text-align: center;
            font-size: 2em;
            margin-bottom: 40px;
            text-shadow: 0 0 15px rgba(139, 0, 0, 0.5);
        }

        .setting-item {
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .setting-item label {
            color: #e0e0e0;
            font-size: 1.1em;
        }

        .setting-item input[type="range"] {
            width: 200px;
            accent-color: #8b0000;
        }

        .setting-item select {
            padding: 8px 15px;
            background: #1a0a0a;
            color: #e0e0e0;
            border: 1px solid #4a4a4a;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
        }

        .value-display {
            color: #c9a959;
            min-width: 50px;
            text-align: center;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #2a0a0a;
            transition: .4s;
            border-radius: 34px;
            border: 1px solid #4a4a4a;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: #8b0000;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #3a0a0a;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
            background-color: #ff0000;
        }

        .danger-btn {
            padding: 8px 20px;
            background: #3a0a0a;
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
        }

        .danger-btn:hover {
            background: #ff6b6b;
            color: #1a1a1a;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }

        /* Game Screen */
        #game-screen {
            background: #000;
            padding: 0;
            gap: 0;
            flex-direction: column;
        }

        #game-canvas-container {
            position: relative;
            width: 100%;
            height: 65%;
            background: #000;
            overflow: hidden;
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .vignette-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.8) 100%);
            z-index: 10;
        }

        .noise-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            z-index: 11;
        }

        .flashlight-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), transparent 0%, transparent 80px, rgba(0,0,0,0.95) 200px);
            z-index: 12;
            transition: background 0.1s ease;
        }

        .game-ui-panel {
            height: 35%;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0a0a 100%);
            border-top: 2px solid #8b0000;
            display: flex;
            flex-direction: column;
            padding: 15px 20px;
            gap: 10px;
            box-shadow: 0 -10px 30px rgba(139, 0, 0, 0.2);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a0a0a;
            flex-wrap: wrap;
            gap: 10px;
        }

        .player-stats {
            display: flex;
            gap: 25px;
            color: #c9a959;
            font-size: 1em;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .health-bar {
            width: 100px;
            height: 12px;
            background: #2a0a0a;
            border: 1px solid #4a0a0a;
            border-radius: 6px;
            overflow: hidden;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b0000, #ff0000);
            transition: width 0.5s ease;
            width: 100%;
        }

        .sanity-bar {
            width: 100px;
            height: 12px;
            background: #0a0a2a;
            border: 1px solid #1a1a4a;
            border-radius: 6px;
            overflow: hidden;
        }

        .sanity-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a0080, #8000ff);
            transition: width 0.5s ease;
            width: 100%;
        }

        .small-btn {
            padding: 6px 16px;
            background: #1a0a0a;
            color: #c9a959;
            border: 1px solid #8b0000;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .small-btn:hover {
            background: #8b0000;
            color: #fff;
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.5);
        }

        .game-text {
            flex: 1;
            color: #d0d0d0;
            font-size: 1em;
            line-height: 1.6;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            overflow-y: auto;
            white-space: pre-wrap;
            border: 1px solid #2a0a0a;
        }

        .game-choices {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 120px;
            overflow-y: auto;
        }

        .choice-btn {
            padding: 10px 16px;
            background: linear-gradient(90deg, #1a0a0a, #2a0a0a);
            color: #c9a959;
            border: 1px solid #4a0a0a;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            text-align: left;
            transition: all 0.3s ease;
            font-size: 0.95em;
        }

        .choice-btn:hover {
            background: linear-gradient(90deg, #3a0a0a, #4a0a0a);
            border-color: #8b0000;
            transform: translateX(8px);
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.3);
            color: #fff;
        }

        .game-input-area {
            display: flex;
            gap: 10px;
        }

        #player-input {
            flex: 1;
            padding: 10px;
            background: #0a0a0a;
            border: 1px solid #4a0a0a;
            color: #e0e0e0;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 1em;
        }

        #player-input:focus {
            outline: none;
            border-color: #8b0000;
            box-shadow: 0 0 10px rgba(139, 0, 0, 0.3);
        }

        #submit-input {
            padding: 10px 20px;
            background: #2a0a0a;
            color: #c9a959;
            border: 1px solid #8b0000;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
        }

        #submit-input:hover {
            background: #8b0000;
            color: #fff;
        }

        .inventory-panel {
            position: absolute;
            right: 20px;
            top: 20px;
            width: 200px;
            background: rgba(5, 5, 5, 0.9);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #8b0000;
            z-index: 20;
            backdrop-filter: blur(5px);
        }

        .inventory-panel h3 {
            color: #c9a959;
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.1em;
            border-bottom: 1px solid #2a0a0a;
            padding-bottom: 8px;
        }

        #inventory-list {
            list-style: none;
            color: #d0d0d0;
            font-size: 0.85em;
        }

        #inventory-list li {
            padding: 6px;
            margin-bottom: 4px;
            background: rgba(42, 10, 10, 0.5);
            border-radius: 3px;
            border-left: 2px solid #8b0000;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 0, 0, 0.95);
            color: #c9a959;
            padding: 15px 25px;
            border: 1px solid #8b0000;
            border-radius: 5px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.5);
        }

        /* Horror Effects */
        .blood-splatter {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .blood-splatter.active {
            opacity: 0.7;
        }

        .screen-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .heartbeat {
            animation: heartbeat 2s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            10% { transform: scale(1.05); }
            20% { transform: scale(1); }
            30% { transform: scale(1.05); }
            40% { transform: scale(1); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #4a0a0a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #8b0000;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .menu-background {
                padding: 40px 30px;
                margin: 20px;
            }
            .game-title { font-size: 2.5em; }
            .menu-btn { width: 220px; padding: 12px 25px; font-size: 1em; }
            .inventory-panel { width: 150px; right: 10px; top: 10px; }
            .player-stats { font-size: 0.85em; gap: 15px; }
            .health-bar, .sanity-bar { width: 70px; }
        }

        @media (max-width: 480px) {
            .game-title { font-size: 2em; }
            .game-subtitle { font-size: 1em; }
            .menu-background { padding: 30px 20px; }
            .inventory-panel { display: none; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- Main Menu Screen -->
    <div id="main-menu" class="screen active">
        <div class="menu-container">
            <div class="menu-overlay"></div>
            <div class="menu-background">
                <h1 class="game-title">Darkwood Chronicles</h1>
                <p class="game-subtitle">A 3D Horror Experience</p>

                <div class="menu-buttons">
                    <button id="play-btn" class="menu-btn">Enter the Darkness</button>
                    <button id="continue-btn" class="menu-btn">Continue Nightmare</button>
                    <button id="settings-btn" class="menu-btn">Settings</button>
                </div>

                <div class="version-text">v2.0.0 - Horror Edition</div>
            </div>
        </div>
    </div>

    <!-- Settings Screen -->
    <div id="settings-screen" class="screen">
        <div class="settings-container">
            <h2>⚙️ Settings</h2>

            <div class="setting-item">
                <label>🎵 Music Volume</label>
                <input type="range" id="music-volume" min="0" max="100" value="50">
                <span class="value-display" id="music-value">50%</span>
            </div>

            <div class="setting-item">
                <label>🔊 Sound Effects</label>
                <input type="range" id="sfx-volume" min="0" max="100" value="70">
                <span class="value-display" id="sfx-value">70%</span>
            </div>

            <div class="setting-item">
                <label>📝 Text Speed</label>
                <select id="text-speed">
                    <option value="slow">Slow</option>
                    <option value="normal" selected>Normal</option>
                    <option value="fast">Fast</option>
                </select>
            </div>

            <div class="setting-item">
                <label>🔦 Flashlight Mode</label>
                <label class="switch">
                    <input type="checkbox" id="flashlight-mode" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <label>🗑️ Delete Save Data</label>
                <button id="delete-save" class="danger-btn">Delete</button>
            </div>

            <button id="back-to-menu" class="menu-btn" style="width: 100%; margin-top: 20px;">Back to Menu</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div id="game-canvas-container">
            <canvas id="game-canvas"></canvas>
            <div class="vignette-overlay"></div>
            <div class="noise-overlay"></div>
            <div class="flashlight-overlay" id="flashlight"></div>

            <div class="inventory-panel">
                <h3>🎒 Inventory</h3>
                <ul id="inventory-list">
                    <li>Empty</li>
                </ul>
            </div>
        </div>

        <div class="game-ui-panel">
            <div class="game-header">
                <div class="player-stats">
                    <span class="stat-item">🏰 <span id="location-name">Darkwood Forest</span></span>
                    <span class="stat-item">❤️ 
                        <div class="health-bar"><div class="health-fill" id="health-bar"></div></div>
                        <span id="health">100</span>
                    </span>
                    <span class="stat-item">🧠 
                        <div class="sanity-bar"><div class="sanity-fill" id="sanity-bar"></div></div>
                        <span id="sanity">100</span>
                    </span>
                    <span class="stat-item">⭐ Level: <span id="level">1</span></span>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button id="save-game-btn" class="small-btn">💾 Save</button>
                    <button id="return-to-menu" class="small-btn">🏠 Menu</button>
                </div>
            </div>

            <div id="game-text" class="game-text">
                Welcome to Darkwood Chronicles...
            </div>

            <div id="game-choices" class="game-choices"></div>

            <div class="game-input-area">
                <input type="text" id="player-input" placeholder="Type your action... (try 'help')">
                <button id="submit-input">Submit</button>
            </div>
        </div>
    </div>

    <script>

        // ============ 3D HORROR ENGINE ============
        class Horror3DEngine {
            constructor() {
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.clock = new THREE.Clock();
                this.objects = [];
                this.particles = null;
                this.ghostObjects = [];
                this.isRunning = false;
                this.mouseX = 0;
                this.mouseY = 0;
                this.canvas = document.getElementById('game-canvas');
                this.container = document.getElementById('game-canvas-container');
            }

            init() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x050505);
                this.scene.fog = new THREE.FogExp2(0x0a0a0a, 0.035);

                this.camera = new THREE.PerspectiveCamera(75, this.container.clientWidth / this.container.clientHeight, 0.1, 1000);
                this.camera.position.set(0, 1.6, 5);

                this.renderer = new THREE.WebGLRenderer({ canvas: this.canvas, antialias: true });
                this.renderer.setSize(this.container.clientWidth, this.container.clientHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;

                this.setupHorrorLighting();
                this.createEnvironment();
                this.createParticles();
                this.createGhostlyFigures();

                window.addEventListener('resize', () => this.onResize());
                this.container.addEventListener('mousemove', (e) => this.onMouseMove(e));

                this.isRunning = true;
                this.animate();
            }

            setupHorrorLighting() {
                const ambientLight = new THREE.AmbientLight(0x1a0505, 0.2);
                this.scene.add(ambientLight);

                const moonLight = new THREE.DirectionalLight(0x4444aa, 0.3);
                moonLight.position.set(10, 20, 10);
                moonLight.castShadow = true;
                this.scene.add(moonLight);
                this.lights = [moonLight];

                this.campfireLight = new THREE.PointLight(0xff4400, 1, 20);
                this.campfireLight.position.set(0, 1, 0);
                this.campfireLight.castShadow = true;
                this.scene.add(this.campfireLight);
                this.lights.push(this.campfireLight);

                this.ghostLight = new THREE.PointLight(0x6600ff, 0.5, 15);
                this.ghostLight.position.set(-5, 2, -5);
                this.scene.add(this.ghostLight);
                this.lights.push(this.ghostLight);
            }

            createEnvironment() {
                const groundGeometry = new THREE.PlaneGeometry(100, 100, 64, 64);
                const groundMaterial = new THREE.MeshStandardMaterial({
                    color: 0x0a0a0a,
                    roughness: 0.9,
                    metalness: 0.1
                });

                const positions = groundGeometry.attributes.position;
                for (let i = 0; i < positions.count; i++) {
                    const x = positions.getX(i);
                    const y = positions.getY(i);
                    const z = Math.sin(x * 0.1) * Math.cos(y * 0.1) * 0.5 + Math.random() * 0.2;
                    positions.setZ(i, z);
                }
                groundGeometry.computeVertexNormals();

                const ground = new THREE.Mesh(groundGeometry, groundMaterial);
                ground.rotation.x = -Math.PI / 2;
                ground.receiveShadow = true;
                this.scene.add(ground);

                this.createTrees();
                this.createDeadTrees();
                this.createRocks();
                this.createCabin();
            }

            createTrees() {
                const treeCount = 40;
                for (let i = 0; i < treeCount; i++) {
                    const height = 4 + Math.random() * 6;
                    const radius = 0.3 + Math.random() * 0.5;

                    const trunkGeo = new THREE.CylinderGeometry(radius * 0.7, radius, height, 6);
                    const trunkMat = new THREE.MeshStandardMaterial({
                        color: 0x1a0a0a,
                        roughness: 0.95,
                        metalness: 0.0
                    });
                    const trunk = new THREE.Mesh(trunkGeo, trunkMat);

                    const angle = Math.random() * Math.PI * 2;
                    const distance = 5 + Math.random() * 25;
                    trunk.position.set(
                        Math.cos(angle) * distance,
                        height / 2,
                        Math.sin(angle) * distance
                    );
                    trunk.castShadow = true;
                    trunk.receiveShadow = true;
                    trunk.rotation.z = (Math.random() - 0.5) * 0.1;
                    trunk.rotation.x = (Math.random() - 0.5) * 0.1;

                    this.scene.add(trunk);
                    this.objects.push(trunk);
                }
            }

            createDeadTrees() {
                for (let i = 0; i < 8; i++) {
                    const height = 3 + Math.random() * 4;
                    const trunkGeo = new THREE.CylinderGeometry(0.1, 0.3, height, 4);
                    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a });
                    const trunk = new THREE.Mesh(trunkGeo, trunkMat);

                    const angle = Math.random() * Math.PI * 2;
                    const distance = 6 + Math.random() * 15;
                    trunk.position.set(
                        Math.cos(angle) * distance,
                        height / 2,
                        Math.sin(angle) * distance
                    );

                    for (let j = 0; j < 3; j++) {
                        const branchGeo = new THREE.CylinderGeometry(0.02, 0.05, 1 + Math.random(), 3);
                        const branch = new THREE.Mesh(branchGeo, trunkMat);
                        branch.position.set(0, height * 0.3 + j * 0.5, 0);
                        branch.rotation.z = Math.random() * Math.PI;
                        branch.rotation.x = Math.random() * Math.PI;
                        trunk.add(branch);
                    }

                    this.scene.add(trunk);
                }
            }

            createRocks() {
                for (let i = 0; i < 15; i++) {
                    const size = 0.3 + Math.random() * 0.8;
                    const rockGeo = new THREE.DodecahedronGeometry(size, 0);
                    const rockMat = new THREE.MeshStandardMaterial({
                        color: 0x111111,
                        roughness: 0.9
                    });
                    const rock = new THREE.Mesh(rockGeo, rockMat);

                    const angle = Math.random() * Math.PI * 2;
                    const distance = 3 + Math.random() * 20;
                    rock.position.set(
                        Math.cos(angle) * distance,
                        size * 0.4,
                        Math.sin(angle) * distance
                    );
                    rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                    rock.castShadow = true;

                    this.scene.add(rock);
                }
            }

            createCabin() {
                const cabinGroup = new THREE.Group();

                const wallMat = new THREE.MeshStandardMaterial({ color: 0x2a1a0a, roughness: 0.9 });
                const wallGeo = new THREE.BoxGeometry(4, 3, 4);
                const walls = new THREE.Mesh(wallGeo, wallMat);
                walls.position.y = 1.5;
                walls.castShadow = true;
                cabinGroup.add(walls);

                const roofGeo = new THREE.ConeGeometry(3.5, 2, 4);
                const roofMat = new THREE.MeshStandardMaterial({ color: 0x1a0a0a });
                const roof = new THREE.Mesh(roofGeo, roofMat);
                roof.position.y = 3.5;
                roof.rotation.y = Math.PI / 4;
                cabinGroup.add(roof);

                const doorGeo = new THREE.BoxGeometry(1, 2, 0.1);
                const doorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a });
                const door = new THREE.Mesh(doorGeo, doorMat);
                door.position.set(0, 1, 2.05);
                cabinGroup.add(door);

                const windowGeo = new THREE.PlaneGeometry(0.8, 0.8);
                const windowMat = new THREE.MeshBasicMaterial({ 
                    color: 0xffaa00,
                    transparent: true,
                    opacity: 0.3
                });
                const window1 = new THREE.Mesh(windowGeo, windowMat);
                window1.position.set(1.5, 1.8, 2.01);
                cabinGroup.add(window1);

                cabinGroup.position.set(-8, 0, -10);
                this.scene.add(cabinGroup);
                this.cabin = cabinGroup;
            }

            createParticles() {
                const particleCount = 200;
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(particleCount * 3);
                const velocities = [];

                for (let i = 0; i < particleCount; i++) {
                    positions[i * 3] = (Math.random() - 0.5) * 40;
                    positions[i * 3 + 1] = Math.random() * 10;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 40;

                    velocities.push({
                        x: (Math.random() - 0.5) * 0.01,
                        y: Math.random() * 0.01,
                        z: (Math.random() - 0.5) * 0.01
                    });
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

                const material = new THREE.PointsMaterial({
                    color: 0x6644aa,
                    size: 0.05,
                    transparent: true,
                    opacity: 0.6,
                    blending: THREE.AdditiveBlending
                });

                this.particles = new THREE.Points(geometry, material);
                this.particles.userData = { velocities };
                this.scene.add(this.particles);
            }

            createGhostlyFigures() {
                for (let i = 0; i < 3; i++) {
                    const ghostGeo = new THREE.SphereGeometry(0.5, 8, 8);
                    const ghostMat = new THREE.MeshBasicMaterial({
                        color: 0x4400aa,
                        transparent: true,
                        opacity: 0.1
                    });
                    const ghost = new THREE.Mesh(ghostGeo, ghostMat);

                    ghost.position.set(
                        (Math.random() - 0.5) * 20,
                        1 + Math.random(),
                        (Math.random() - 0.5) * 20 - 10
                    );

                    ghost.userData = {
                        originalY: ghost.position.y,
                        speed: 0.5 + Math.random() * 0.5,
                        offset: Math.random() * Math.PI * 2
                    };

                    this.scene.add(ghost);
                    this.ghostObjects.push(ghost);
                }
            }

            onMouseMove(e) {
                const rect = this.container.getBoundingClientRect();
                this.mouseX = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                this.mouseY = -((e.clientY - rect.top) / rect.height) * 2 + 1;

                const flashlight = document.getElementById('flashlight');
                if (flashlight && gameState.settings.flashlightMode) {
                    const x = ((e.clientX - rect.left) / rect.width) * 100;
                    const y = ((e.clientY - rect.top) / rect.height) * 100;
                    flashlight.style.setProperty('--mouse-x', x + '%');
                    flashlight.style.setProperty('--mouse-y', y + '%');
                }
            }

            onResize() {
                if (!this.camera || !this.renderer) return;
                this.camera.aspect = this.container.clientWidth / this.container.clientHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(this.container.clientWidth, this.container.clientHeight);
            }

            updateParticles() {
                if (!this.particles) return;
                const positions = this.particles.geometry.attributes.position.array;
                const velocities = this.particles.userData.velocities;

                for (let i = 0; i < velocities.length; i++) {
                    positions[i * 3] += velocities[i].x;
                    positions[i * 3 + 1] += velocities[i].y;
                    positions[i * 3 + 2] += velocities[i].z;

                    if (positions[i * 3 + 1] > 10) {
                        positions[i * 3 + 1] = 0;
                    }
                }

                this.particles.geometry.attributes.position.needsUpdate = true;
            }

            updateGhosts(time) {
                this.ghostObjects.forEach((ghost, i) => {
                    ghost.position.y = ghost.userData.originalY + Math.sin(time * ghost.userData.speed + ghost.userData.offset) * 0.5;
                    ghost.material.opacity = 0.05 + Math.sin(time * 2 + i) * 0.05;
                    ghost.rotation.y += 0.005;
                });
            }

            updateLights(time) {
                this.campfireLight.intensity = 0.8 + Math.sin(time * 10) * 0.2 + Math.random() * 0.3;
                this.campfireLight.color.setHSL(0.08 + Math.sin(time * 5) * 0.02, 1, 0.5);

                this.ghostLight.intensity = 0.3 + Math.sin(time * 2) * 0.2;
                this.ghostLight.position.x = -5 + Math.sin(time * 0.5) * 2;
            }

            updateCamera(time) {
                this.camera.position.y = 1.6 + Math.sin(time * 0.5) * 0.05;
                this.camera.rotation.y = this.mouseX * 0.1;
                this.camera.rotation.x = this.mouseY * 0.05;
            }

            animate() {
                if (!this.isRunning) return;
                requestAnimationFrame(() => this.animate());

                const time = this.clock.getElapsedTime();

                this.updateParticles();
                this.updateGhosts(time);
                this.updateLights(time);
                this.updateCamera(time);

                this.renderer.render(this.scene, this.camera);
            }

            dispose() {
                this.isRunning = false;
                if (this.renderer) {
                    this.renderer.dispose();
                }
            }
        }

        // ============ GAME STATE MANAGEMENT ============
        class GameState {
            constructor() {
                this.currentScreen = 'main-menu';
                this.player = {
                    name: 'Adventurer',
                    health: 100,
                    sanity: 100,
                    level: 1,
                    location: 'Darkwood Forest',
                    inventory: []
                };
                this.gameProgress = {
                    currentChapter: 'start',
                    decisions: []
                };
                this.settings = {
                    musicVolume: 50,
                    sfxVolume: 70,
                    textSpeed: 'normal',
                    flashlightMode: true
                };
                this.loadSettings();
            }

            saveGame() {
                const saveData = {
                    player: this.player,
                    gameProgress: this.gameProgress,
                    timestamp: new Date().toISOString()
                };
                localStorage.setItem('darkwood-save', JSON.stringify(saveData));
                return true;
            }

            loadGame() {
                const saveData = localStorage.getItem('darkwood-save');
                if (saveData) {
                    const parsed = JSON.parse(saveData);
                    this.player = parsed.player;
                    this.gameProgress = parsed.gameProgress;
                    return true;
                }
                return false;
            }

            hasSaveData() {
                return localStorage.getItem('darkwood-save') !== null;
            }

            deleteSave() {
                localStorage.removeItem('darkwood-save');
            }

            saveSettings() {
                localStorage.setItem('darkwood-settings', JSON.stringify(this.settings));
            }

            loadSettings() {
                const settingsData = localStorage.getItem('darkwood-settings');
                if (settingsData) {
                    this.settings = { ...this.settings, ...JSON.parse(settingsData) };
                }
            }
        }

        // ============ UI MANAGER ============
        class UIManager {
            constructor(gameState) {
                this.gameState = gameState;
                this.horrorEngine = null;
                this.elements = {
                    mainMenu: document.getElementById('main-menu'),
                    settingsScreen: document.getElementById('settings-screen'),
                    gameScreen: document.getElementById('game-screen'),
                    gameText: document.getElementById('game-text'),
                    gameChoices: document.getElementById('game-choices'),
                    playerInput: document.getElementById('player-input'),
                    inventoryList: document.getElementById('inventory-list'),
                    health: document.getElementById('health'),
                    healthBar: document.getElementById('health-bar'),
                    sanity: document.getElementById('sanity'),
                    sanityBar: document.getElementById('sanity-bar'),
                    level: document.getElementById('level'),
                    locationName: document.getElementById('location-name')
                };

                this.setupEventListeners();
                this.applySettings();
                this.updateContinueButton();
            }

            setupEventListeners() {
                document.getElementById('play-btn').addEventListener('click', () => this.startNewGame());
                document.getElementById('continue-btn').addEventListener('click', () => this.continueGame());
                document.getElementById('settings-btn').addEventListener('click', () => this.showSettings());

                document.getElementById('back-to-menu').addEventListener('click', () => this.showScreen('main-menu'));
                document.getElementById('delete-save').addEventListener('click', () => this.deleteSaveData());

                document.getElementById('music-volume').addEventListener('input', (e) => {
                    this.gameState.settings.musicVolume = e.target.value;
                    document.getElementById('music-value').textContent = e.target.value + '%';
                    this.gameState.saveSettings();
                });

                document.getElementById('sfx-volume').addEventListener('input', (e) => {
                    this.gameState.settings.sfxVolume = e.target.value;
                    document.getElementById('sfx-value').textContent = e.target.value + '%';
                    this.gameState.saveSettings();
                });

                document.getElementById('text-speed').addEventListener('change', (e) => {
                    this.gameState.settings.textSpeed = e.target.value;
                    this.gameState.saveSettings();
                });

                document.getElementById('flashlight-mode').addEventListener('change', (e) => {
                    this.gameState.settings.flashlightMode = e.target.checked;
                    this.gameState.saveSettings();
                    this.applySettings();
                });

                document.getElementById('return-to-menu').addEventListener('click', () => {
                    if (confirm('Return to main menu? Unsaved progress will be lost.')) {
                        if (this.horrorEngine) {
                            this.horrorEngine.dispose();
                            this.horrorEngine = null;
                        }
                        this.showScreen('main-menu');
                    }
                });

                document.getElementById('save-game-btn').addEventListener('click', () => this.saveGame());
                document.getElementById('submit-input').addEventListener('click', () => this.handlePlayerInput());

                document.getElementById('player-input').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        this.handlePlayerInput();
                    }
                });
            }

            showScreen(screenName) {
                document.querySelectorAll('.screen').forEach(screen => {
                    screen.classList.remove('active');
                });

                switch(screenName) {
                    case 'main-menu':
                        this.elements.mainMenu.classList.add('active');
                        this.updateContinueButton();
                        break;
                    case 'settings':
                        this.elements.settingsScreen.classList.add('active');
                        this.updateSettingsDisplay();
                        break;
                    case 'game':
                        this.elements.gameScreen.classList.add('active');
                        break;
                }

                this.gameState.currentScreen = screenName;
            }

            startNewGame() {
                this.gameState.player = {
                    name: 'Adventurer',
                    health: 100,
                    sanity: 100,
                    level: 1,
                    location: 'Darkwood Forest',
                    inventory: []
                };
                this.gameState.gameProgress = {
                    currentChapter: 'start',
                    decisions: []
                };

                this.showScreen('game');
                this.updatePlayerStats();

                if (!this.horrorEngine) {
                    this.horrorEngine = new Horror3DEngine();
                    this.horrorEngine.init();
                }

                this.showGameText(gameStory.start);
            }

            continueGame() {
                if (this.gameState.hasSaveData()) {
                    if (this.gameState.loadGame()) {
                        this.showScreen('game');
                        this.updatePlayerStats();

                        if (!this.horrorEngine) {
                            this.horrorEngine = new Horror3DEngine();
                            this.horrorEngine.init();
                        }

                        const currentChapter = this.gameState.gameProgress.currentChapter;
                        if (gameStory[currentChapter]) {
                            this.showGameText(gameStory[currentChapter]);
                        } else {
                            this.showGameText(gameStory.start);
                        }

                        this.showNotification('Nightmare continues...');
                    }
                } else {
                    this.showNotification('No save data found!');
                }
            }

            updateContinueButton() {
                const continueBtn = document.getElementById('continue-btn');
                if (this.gameState.hasSaveData()) {
                    continueBtn.disabled = false;
                    continueBtn.title = 'Continue your nightmare';
                } else {
                    continueBtn.disabled = true;
                    continueBtn.title = 'No save data available';
                }
            }

            showSettings() {
                this.showScreen('settings');
            }

            updateSettingsDisplay() {
                document.getElementById('music-volume').value = this.gameState.settings.musicVolume;
                document.getElementById('music-value').textContent = this.gameState.settings.musicVolume + '%';
                document.getElementById('sfx-volume').value = this.gameState.settings.sfxVolume;
                document.getElementById('sfx-value').textContent = this.gameState.settings.sfxVolume + '%';
                document.getElementById('text-speed').value = this.gameState.settings.textSpeed;
                document.getElementById('flashlight-mode').checked = this.gameState.settings.flashlightMode;
            }

            applySettings() {
                const flashlight = document.getElementById('flashlight');
                if (flashlight) {
                    flashlight.style.display = this.gameState.settings.flashlightMode ? 'block' : 'none';
                }
            }

            saveGame() {
                if (this.gameState.saveGame()) {
                    this.showNotification('💾 Nightmare saved...');
                }
            }

            deleteSaveData() {
                if (confirm('Are you sure you want to erase all memories? This cannot be undone.')) {
                    this.gameState.deleteSave();
                    this.updateContinueButton();
                    this.showNotification('Memories erased.');
                }
            }

            updatePlayerStats() {
                this.elements.health.textContent = this.gameState.player.health;
                this.elements.sanity.textContent = this.gameState.player.sanity;
                this.elements.level.textContent = this.gameState.player.level;
                this.elements.locationName.textContent = this.gameState.player.location;

                this.elements.healthBar.style.width = this.gameState.player.health + '%';
                this.elements.sanityBar.style.width = this.gameState.player.sanity + '%';

                if (this.gameState.player.health <= 30) {
                    this.elements.healthBar.style.background = 'linear-gradient(90deg, #ff0000, #ff4444)';
                    document.body.classList.add('heartbeat');
                } else {
                    this.elements.healthBar.style.background = 'linear-gradient(90deg, #8b0000, #ff0000)';
                    document.body.classList.remove('heartbeat');
                }

                if (this.gameState.player.sanity <= 30) {
                    this.elements.sanityBar.style.background = 'linear-gradient(90deg, #8000ff, #ff00ff)';
                } else {
                    this.elements.sanityBar.style.background = 'linear-gradient(90deg, #4a0080, #8000ff)';
                }

                this.elements.inventoryList.innerHTML = '';
                if (this.gameState.player.inventory.length === 0) {
                    this.elements.inventoryList.innerHTML = '<li>Empty</li>';
                } else {
                    this.gameState.player.inventory.forEach(item => {
                        const li = document.createElement('li');
                        li.textContent = '• ' + item;
                        this.elements.inventoryList.appendChild(li);
                    });
                }
            }

            showGameText(storyNode) {
                const textElement = this.elements.gameText;
                const choicesElement = this.elements.gameChoices;

                textElement.textContent = '';
                choicesElement.innerHTML = '';

                const speed = this.gameState.settings.textSpeed;
                const delay = speed === 'fast' ? 10 : speed === 'slow' ? 40 : 25;

                let i = 0;
                const typeWriter = () => {
                    if (i < storyNode.text.length) {
                        textElement.textContent += storyNode.text.charAt(i);
                        i++;
                        textElement.scrollTop = textElement.scrollHeight;
                        setTimeout(typeWriter, delay);
                    } else {
                        storyNode.choices.forEach((choice, index) => {
                            const button = document.createElement('button');
                            button.className = 'choice-btn';
                            button.textContent = (index + 1) + '. ' + choice.text;
                            button.addEventListener('click', () => this.makeChoice(choice));
                            choicesElement.appendChild(button);
                        });
                    }
                };

                typeWriter();

                if (storyNode.horror) {
                    this.triggerHorrorEffect();
                }
            }

            triggerHorrorEffect() {
                const effects = ['screen-shake', 'heartbeat'];
                const effect = effects[Math.floor(Math.random() * effects.length)];
                document.body.classList.add(effect);

                setTimeout(() => {
                    document.body.classList.remove(effect);
                }, 500);

                if (Math.random() > 0.7 && this.horrorEngine) {
                    this.horrorEngine.ghostLight.intensity = 2;
                    setTimeout(() => {
                        if (this.horrorEngine) {
                            this.horrorEngine.ghostLight.intensity = 0.5;
                        }
                    }, 200);
                }
            }

            makeChoice(choice) {
                this.gameState.gameProgress.decisions.push({
                    chapter: this.gameState.gameProgress.currentChapter,
                    choice: choice.text
                });

                this.handleSpecialEvents(choice);

                if (choice.next === 'menu') {
                    if (this.horrorEngine) {
                        this.horrorEngine.dispose();
                        this.horrorEngine = null;
                    }
                    this.showScreen('main-menu');
                    return;
                }

                if (gameStory[choice.next]) {
                    this.gameState.gameProgress.currentChapter = choice.next;
                    this.showGameText(gameStory[choice.next]);
                } else {
                    const fallbackText = {
                        text: "You continue your journey through the Darkwood Forest. The path ahead is still shrouded in mystery...\n\n(More nightmares coming soon!)",
                        choices: [
                            { text: "Continue exploring", next: 'start' }
                        ]
                    };
                    this.showGameText(fallbackText);
                }

                this.updatePlayerStats();
                this.autoSave();
            }

            handleSpecialEvents(choice) {
                const next = choice.next;
                const node = gameStory[next];

                if (node) {
                    if (node.healthDamage) {
                        this.gameState.player.health = Math.max(0, this.gameState.player.health - node.healthDamage);
                    }
                    if (node.sanityDamage) {
                        this.gameState.player.sanity = Math.max(0, this.gameState.player.sanity - node.sanityDamage);
                    }
                    if (node.healthBonus) {
                        this.gameState.player.health = Math.min(100, this.gameState.player.health + node.healthBonus);
                    }
                    if (node.sanityBonus) {
                        this.gameState.player.sanity = Math.min(100, this.gameState.player.sanity + node.sanityBonus);
                    }
                }

                if (next === 'searchArea') {
                    this.addToInventory(['Rusty Dagger', 'Mysterious Parchment', '3 Gold Coins', 'Healing Potion']);
                } else if (next === 'openChestWithKey') {
                    this.addToInventory(['Silver Amulet', 'Healing Potion']);
                } else if (next === 'findKey') {
                    this.addToInventory(['Rusty Iron Key']);
                } else if (next === 'searchSupplies') {
                    this.addToInventory(['Dried Meat', 'Water Flask', 'Bandages']);
                } else if (next === 'collectHerbs') {
                    this.addToInventory(['Whispering Herbs']);
                } else if (next === 'drinkVial') {
                    this.addToInventory(['Second Sight']);
                }
            }

            addToInventory(items) {
                items.forEach(item => {
                    if (!this.gameState.player.inventory.includes(item)) {
                        this.gameState.player.inventory.push(item);
                    }
                });
            }

            autoSave() {
                this.gameState.saveGame();
                this.updateContinueButton();
            }

            handlePlayerInput() {
                const input = document.getElementById('player-input');
                const command = input.value.trim().toLowerCase();
                input.value = '';

                if (command) {
                    this.processCommand(command);
                }
            }

            processCommand(command) {
                const textElement = this.elements.gameText;

                if (command.includes('look') || command.includes('examine')) {
                    textElement.textContent += '\n\n> You look around carefully, taking in your surroundings. The darkness seems to watch back.';
                } else if (command.includes('inventory') || command.includes('bag')) {
                    const inv = this.gameState.player.inventory;
                    textElement.textContent += '\n\n> Inventory: ' + (inv.length > 0 ? inv.join(', ') : 'Empty');
                } else if (command.includes('health') || command.includes('hp')) {
                    textElement.textContent += '\n\n> Health: ' + this.gameState.player.health + '/100';
                } else if (command.includes('sanity')) {
                    textElement.textContent += '\n\n> Sanity: ' + this.gameState.player.sanity + '/100';
                } else if (command.includes('help')) {
                    textElement.textContent += '\n\n> Available commands: look, inventory, health, sanity, help, save, load';
                } else if (command.includes('save')) {
                    this.saveGame();
                    textElement.textContent += '\n\n> Nightmare saved...';
                } else if (command.includes('load')) {
                    if (this.gameState.hasSaveData()) {
                        this.continueGame();
                    } else {
                        textElement.textContent += '\n\n> No memories found.';
                    }
                } else {
                    textElement.textContent += '\n\n> "' + command + '" - Nothing happens. Type "help" for available commands.';
                }

                textElement.scrollTop = textElement.scrollHeight;
            }

            showNotification(message) {
                document.querySelectorAll('.notification').forEach(n => n.remove());

                const notification = document.createElement('div');
                notification.className = 'notification';
                notification.textContent = message;
                document.body.appendChild(notification);

                setTimeout(() => {
                    notification.style.animation = 'slideOut 0.3s ease';
                    setTimeout(() => notification.remove(), 300);
                }, 2000);
            }
        }

        // ============ INITIALIZE ============
        const gameState = new GameState();
        const uiManager = new UIManager(gameState);

        console.log('Darkwood Chronicles - 3D Horror Experience');
        console.log('Ready to enter the darkness...');
    </script>
</body>
</html>
