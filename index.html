<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARKWOOD - First Person Horror</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Courier New', monospace;
  background: #000;
  color: #e0e0e0;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  cursor: none;
}
#canvas-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}
#game-canvas { display: block; width: 100%; height: 100%; }

/* UI Overlay */
#ui-layer {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 10;
  pointer-events: none;
}

/* Crosshair */
#crosshair {
  position: absolute;
  top: 50%; left: 50%;
  width: 20px; height: 20px;
  transform: translate(-50%, -50%);
  opacity: 0.4;
}
#crosshair::before, #crosshair::after {
  content: '';
  position: absolute;
  background: #8b0000;
}
#crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
#crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }

/* Bars */
#hud-bars {
  position: absolute;
  bottom: 30px; left: 30px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.bar-container {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.75em;
  color: #aaa;
  text-shadow: 0 0 5px #000;
}
.bar-label { width: 60px; text-align: right; }
.bar-outer {
  width: 150px; height: 14px;
  background: rgba(0,0,0,0.7);
  border: 1px solid #333;
  border-radius: 3px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  transition: width 0.3s ease;
  border-radius: 2px;
}
#health-fill { background: linear-gradient(90deg, #500, #f00); width: 100%; }
#sanity-fill { background: linear-gradient(90deg, #408, #a0f); width: 100%; }
#stamina-fill { background: linear-gradient(90deg, #060, #0f0); width: 100%; }
#battery-fill { background: linear-gradient(90deg, #440, #fa0); width: 100%; }

/* Interaction prompt */
#interaction-prompt {
  position: absolute;
  bottom: 120px; left: 50%;
  transform: translateX(-50%);
  color: #c9a959;
  font-size: 1em;
  text-shadow: 0 0 10px #000;
  opacity: 0;
  transition: opacity 0.3s;
}

/* Damage overlay */
#damage-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(circle, transparent 50%, rgba(255,0,0,0.4) 100%);
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}

/* Jump scare flash */
#jumpscare-flash {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #fff;
  opacity: 0;
  pointer-events: none;
  z-index: 100;
}

/* Monster face overlay for jump scares */
#monster-face {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: none;
  z-index: 99;
  background: #000;
}
#monster-face-canvas {
  width: 100%; height: 100%;
}

/* Vignette */
#vignette {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.85) 100%);
  pointer-events: none;
}

/* Noise */
#noise {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  opacity: 0.04;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* Title Screen */
#title-screen {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: url('https://kommodo.ai/i/ouFPT0Zb7uzB4fTeS9dT') center/cover no-repeat #050505;
}
#title-screen::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
}
#title-content {
  position: relative;
  z-index: 2;
  text-align: center;
}
#game-title {
  font-size: 5em;
  color: #c9a959;
  text-shadow: 0 0 30px rgba(139,0,0,0.8), 0 0 60px rgba(0,0,0,0.9);
  letter-spacing: 8px;
  margin-bottom: 10px;
  animation: title-flicker 4s infinite alternate;
}
@keyframes title-flicker {
  0%,100% { opacity: 1; }
  45% { opacity: 1; }
  46% { opacity: 0.3; }
  47% { opacity: 1; }
  48% { opacity: 0.5; }
  49% { opacity: 1; }
}
#game-subtitle {
  font-size: 1.3em;
  color: #666;
  margin-bottom: 60px;
  letter-spacing: 4px;
}
.title-btn {
  width: 300px;
  padding: 18px;
  margin: 12px;
  font-size: 1.2em;
  background: linear-gradient(135deg, #1a0505, #2a0a0a);
  color: #c9a959;
  border: 2px solid #8b0000;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  letter-spacing: 3px;
  transition: all 0.3s;
  position: relative;
  z-index: 2;
}
.title-btn:hover {
  background: #8b0000;
  color: #fff;
  box-shadow: 0 0 40px rgba(139,0,0,0.6);
  transform: scale(1.05);
}
.title-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Game Over Screen */
#gameover-screen {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 2000;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #000;
}
#gameover-text {
  font-size: 4em;
  color: #8b0000;
  text-shadow: 0 0 20px #f00;
  margin-bottom: 30px;
  animation: blood-drip 3s ease-in-out;
}
@keyframes blood-drip {
  0% { transform: translateY(-50px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}
#gameover-reason {
  font-size: 1.2em;
  color: #666;
  margin-bottom: 40px;
}

/* Subtitles for voice */
#subtitles {
  position: absolute;
  bottom: 160px; left: 50%;
  transform: translateX(-50%);
  color: #c9a959;
  font-size: 1.1em;
  text-shadow: 0 0 10px #000, 0 0 20px #000;
  text-align: center;
  max-width: 80%;
  opacity: 0;
  transition: opacity 0.5s;
}

/* Objective marker */
#objective {
  position: absolute;
  top: 30px; left: 50%;
  transform: translateX(-50%);
  color: #8b0000;
  font-size: 0.9em;
  text-shadow: 0 0 10px #000;
  letter-spacing: 2px;
  opacity: 0.8;
}

/* Inventory quick view */
#quick-inventory {
  position: absolute;
  top: 30px; right: 30px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  align-items: flex-end;
}
.inv-item {
  background: rgba(0,0,0,0.6);
  border: 1px solid #4a0a0a;
  padding: 4px 10px;
  font-size: 0.7em;
  color: #c9a959;
  border-radius: 2px;
}

/* Death cam overlay */
#death-cam {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: none;
  z-index: 50;
}

/* Settings */
#settings-panel {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(5,5,5,0.95);
  border: 2px solid #8b0000;
  padding: 30px 40px;
  border-radius: 8px;
  z-index: 3000;
  display: none;
  min-width: 400px;
}
#settings-panel h2 {
  color: #c9a959;
  text-align: center;
  margin-bottom: 25px;
}
.setting-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
  color: #aaa;
  font-size: 0.9em;
}
.setting-row input[type="range"] {
  width: 150px;
  accent-color: #8b0000;
}

/* Loading */
#loading {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #000;
  z-index: 5000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: #8b0000;
  font-size: 1.2em;
}
#loading-bar {
  width: 300px; height: 4px;
  background: #1a0a0a;
  margin-top: 20px;
  border-radius: 2px;
  overflow: hidden;
}
#loading-fill {
  width: 0%; height: 100%;
  background: #8b0000;
  transition: width 0.3s;
}

/* Screen shake class */
.shake {
  animation: shake-cam 0.5s cubic-bezier(.36,.07,.19,.97) both;
}
@keyframes shake-cam {
  10%,90% { transform: translate3d(-2px,1px,0); }
  20%,80% { transform: translate3d(4px,-2px,0); }
  30%,50%,70% { transform: translate3d(-6px,3px,0); }
  40%,60% { transform: translate3d(6px,-3px,0); }
}

/* Flashlight battery low warning */
.battery-low { animation: battery-pulse 1s infinite; }
@keyframes battery-pulse {
  0%,100% { border-color: #fa0; }
  50% { border-color: #f00; }
}

/* Sanity low effect */
.sanity-low {
  filter: contrast(1.2) saturate(0.3) hue-rotate(280deg);
}

/* Responsive */
@media (max-width: 768px) {
  #game-title { font-size: 3em; }
  .title-btn { width: 250px; padding: 14px; }
  .bar-outer { width: 100px; }
}
</style>

<body>

<!-- Loading -->
<div id="loading">
  <div>Entering the Darkwood...</div>
  <div id="loading-bar"><div id="loading-fill"></div></div>
</div>

<!-- Title Screen -->
<div id="title-screen">
  <div id="title-content">
    <h1 id="game-title">DARKWOOD</h1>
    <p id="game-subtitle">FIRST PERSON HORROR</p>
    <button class="title-btn" id="btn-start">ENTER THE FOREST</button>
    <button class="title-btn" id="btn-continue">CONTINUE</button>
    <button class="title-btn" id="btn-settings">SETTINGS</button>
  </div>
</div>

<!-- Settings -->
<div id="settings-panel">
  <h2>SETTINGS</h2>
  <div class="setting-row">
    <label>Mouse Sensitivity</label>
    <input type="range" id="sens-slider" min="1" max="10" value="5">
  </div>
  <div class="setting-row">
    <label>Master Volume</label>
    <input type="range" id="vol-slider" min="0" max="100" value="70">
  </div>
  <div class="setting-row">
    <label>Voice Narration</label>
    <input type="range" id="voice-slider" min="0" max="100" value="80">
  </div>
  <div class="setting-row">
    <label>Jump Scare Intensity</label>
    <input type="range" id="jumpscare-slider" min="0" max="100" value="100">
  </div>

</div>

<!-- Game Over -->
<div id="gameover-screen">
  <div id="gameover-text">YOU DIED</div>
  <div id="gameover-reason">The forest has claimed you.</div>
  <button class="title-btn" id="btn-retry">TRY AGAIN</button>
  <button class="title-btn" id="btn-menu">MAIN MENU</button>
</div>

<!-- 3D Canvas -->
<div id="canvas-container">
  <canvas id="game-canvas"></canvas>
</div>

<!-- UI Layer -->
<div id="ui-layer">
  <div id="vignette"></div>
  <div id="noise"></div>
  <div id="damage-overlay"></div>
  <div id="jumpscare-flash"></div>
  <div id="monster-face"><canvas id="monster-face-canvas"></canvas></div>
  <div id="death-cam"></div>

  <div id="crosshair"></div>

  <div id="objective">FIND THE CABIN</div>

  <div id="quick-inventory"></div>

  <div id="hud-bars">
    <div class="bar-container">
      <span class="bar-label">HEALTH</span>
      <div class="bar-outer"><div class="bar-fill" id="health-fill"></div></div>
    </div>
    <div class="bar-container">
      <span class="bar-label">SANITY</span>
      <div class="bar-outer"><div class="bar-fill" id="sanity-fill"></div></div>
    </div>
    <div class="bar-container">
      <span class="bar-label">STAMINA</span>
      <div class="bar-outer"><div class="bar-fill" id="stamina-fill"></div></div>
    </div>
    <div class="bar-container">
      <span class="bar-label">FLASHLIGHT</span>
      <div class="bar-outer" id="battery-outer"><div class="bar-fill" id="battery-fill"></div></div>
    </div>
  </div>

  <div id="interaction-prompt">[E] OPEN DOOR</div>
  <div id="subtitles"></div>
</div>

<script>

// ============ AUDIO MANAGER ============
class AudioManager {
  constructor() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.connect(this.ctx.destination);
    this.masterGain.gain.value = 0.7;
    this.sounds = {};
    this.voiceEnabled = true;
    this.voiceVolume = 0.8;
    this.proceduralSounds = {};
  }

  playTone(freq, duration, type='sine', vol=0.3, fade=true) {
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
    if (fade) {
      gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
    }
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start();
    osc.stop(this.ctx.currentTime + duration);
    return { osc, gain };
  }

  playNoise(duration, vol=0.2) {
    const bufferSize = this.ctx.sampleRate * duration;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    const noise = this.ctx.createBufferSource();
    noise.buffer = buffer;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
    noise.connect(gain);
    gain.connect(this.masterGain);
    noise.start();
    noise.stop(this.ctx.currentTime + duration);
  }

  startAmbientDrone() {
    if (this.proceduralSounds.drone) return;
    const osc1 = this.ctx.createOscillator();
    const osc2 = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc1.type = 'sawtooth';
    osc2.type = 'sine';
    osc1.frequency.setValueAtTime(40, this.ctx.currentTime);
    osc2.frequency.setValueAtTime(42, this.ctx.currentTime);
    gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(200, this.ctx.currentTime);
    osc1.connect(filter);
    osc2.connect(filter);
    filter.connect(gain);
    gain.connect(this.masterGain);
    osc1.start();
    osc2.start();
    this.proceduralSounds.drone = { osc1, osc2, gain, filter };
  }

  stopAmbientDrone() {
    if (this.proceduralSounds.drone) {
      this.proceduralSounds.drone.osc1.stop();
      this.proceduralSounds.drone.osc2.stop();
      this.proceduralSounds.drone = null;
    }
  }

  startHeartbeat(intensity=1) {
    if (this.proceduralSounds.heartbeat) return;
    const playBeat = () => {
      if (!this.proceduralSounds.heartbeat) return;
      const t = this.ctx.currentTime;
      // Lub
      const osc1 = this.ctx.createOscillator();
      const g1 = this.ctx.createGain();
      osc1.frequency.setValueAtTime(30, t);
      g1.gain.setValueAtTime(0.3 * intensity, t);
      g1.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc1.connect(g1); g1.connect(this.masterGain);
      osc1.start(t); osc1.stop(t + 0.1);
      // Dub
      const osc2 = this.ctx.createOscillator();
      const g2 = this.ctx.createGain();
      osc2.frequency.setValueAtTime(25, t + 0.15);
      g2.gain.setValueAtTime(0.25 * intensity, t + 0.15);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc2.connect(g2); g2.connect(this.masterGain);
      osc2.start(t + 0.15); osc2.stop(t + 0.25);
      const interval = intensity > 1.5 ? 400 : intensity > 1 ? 600 : 800;
      this.proceduralSounds.heartbeat.timer = setTimeout(playBeat, interval);
    };
    this.proceduralSounds.heartbeat = { timer: null };
    playBeat();
  }

  stopHeartbeat() {
    if (this.proceduralSounds.heartbeat) {
      clearTimeout(this.proceduralSounds.heartbeat.timer);
      this.proceduralSounds.heartbeat = null;
    }
  }

  playFootstep(isRunning=false, isCrouch=false) {
    const vol = isRunning ? 0.15 : isCrouch ? 0.05 : 0.1;
    const dur = isRunning ? 0.08 : 0.12;
    this.playNoise(dur, vol);
    // Add a low thud
    this.playTone(80 + Math.random()*40, dur, 'triangle', vol*0.5);
  }

  playScream() {
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(400, this.ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, this.ctx.currentTime + 0.3);
    osc.frequency.exponentialRampToValueAtTime(200, this.ctx.currentTime + 1.5);
    gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 1.5);
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(800, this.ctx.currentTime);
    filter.Q.setValueAtTime(2, this.ctx.currentTime);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(this.masterGain);
    osc.start();
    osc.stop(this.ctx.currentTime + 1.5);
    this.playNoise(1.5, 0.3);
  }

  playMonsterGrowl(dist=1) {
    const vol = Math.max(0, 0.4 - dist * 0.05);
    if (vol <= 0) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(60, this.ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(40, this.ctx.currentTime + 0.5);
    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.8);
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(300, this.ctx.currentTime);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(this.masterGain);
    osc.start();
    osc.stop(this.ctx.currentTime + 0.8);
  }

  playDoorCreak() {
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, this.ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, this.ctx.currentTime + 1.2);
    gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 1.2);
    osc.connect(gain);
    gain.connect(this.masterGain);
    osc.start();
    osc.stop(this.ctx.currentTime + 1.2);
  }

  playJumpScareSound() {
    // Loud noise burst
    this.playNoise(0.5, 0.8);
    this.playTone(200, 0.3, 'square', 0.6, false);
    this.playTone(800, 0.5, 'sawtooth', 0.5);
    // Scream layer
    setTimeout(() => this.playScream(), 100);
  }

  playWhisper() {
    const phrases = [
      { freq: 300, dur: 0.8 },
      { freq: 250, dur: 0.6 },
      { freq: 350, dur: 0.7 }
    ];
    const p = phrases[Math.floor(Math.random() * phrases.length)];
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(p.freq, this.ctx.currentTime);
    gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + p.dur);
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(400, this.ctx.currentTime);
    filter.Q.setValueAtTime(8, this.ctx.currentTime);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(this.masterGain);
    osc.start();
    osc.stop(this.ctx.currentTime + p.dur);
  }

  speak(text, priority=false) {
    if (!this.voiceEnabled || !window.speechSynthesis) return;
    // Cancel existing if priority
    if (priority) window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.75;
    utter.pitch = 0.6;
    utter.volume = this.voiceVolume;
    // Try to find a dark/deep voice
    const voices = window.speechSynthesis.getVoices();
    const deepVoice = voices.find(v => v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('daniel') || v.name.toLowerCase().includes('david'));
    if (deepVoice) utter.voice = deepVoice;
    window.speechSynthesis.speak(utter);
    // Show subtitles
    const sub = document.getElementById('subtitles');
    if (sub) {
      sub.textContent = text;
      sub.style.opacity = '1';
      setTimeout(() => { sub.style.opacity = '0'; }, Math.max(3000, text.length * 80));
    }
  }

  setMasterVolume(v) {
    this.masterGain.gain.value = v / 100;
  }
}

// ============ JUMP SCARE MANAGER ============
class JumpScareManager {
  constructor(audio) {
    this.audio = audio;
    this.cooldown = 0;
    this.intensity = 1.0;
    this.canvas = document.getElementById('monster-face-canvas');
    this.ctx2d = this.canvas.getContext('2d');
    this.resizeFaceCanvas();
    window.addEventListener('resize', () => this.resizeFaceCanvas());
  }

  resizeFaceCanvas() {
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
  }

  drawMonsterFace() {
    const w = this.canvas.width;
    const h = this.canvas.height;
    const ctx = this.ctx2d;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);

    // Pale face
    const faceW = w * 0.5;
    const faceH = h * 0.7;
    const fx = w/2 - faceW/2;
    const fy = h/2 - faceH/2;

    ctx.fillStyle = '#e8e0d0';
    ctx.beginPath();
    ctx.ellipse(w/2, h/2, faceW/2, faceH/2, 0, 0, Math.PI*2);
    ctx.fill();

    // Dark shadows on face
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(w/2 + faceW*0.15, h/2 + faceH*0.1, faceW*0.35, faceH*0.4, 0.2, 0, Math.PI*2);
    ctx.fill();

    // Eyes - black voids
    const eyeY = h/2 - faceH*0.08;
    const eyeX1 = w/2 - faceW*0.18;
    const eyeX2 = w/2 + faceW*0.18;
    const eyeR = faceW * 0.12;

    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(eyeX1, eyeY, eyeR, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(eyeX2, eyeY, eyeR, 0, Math.PI*2); ctx.fill();

    // Eye glints
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(eyeX1 - eyeR*0.3, eyeY - eyeR*0.3, eyeR*0.15, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(eyeX2 - eyeR*0.3, eyeY - eyeR*0.3, eyeR*0.15, 0, Math.PI*2); ctx.fill();

    // Veins around eyes
    ctx.strokeStyle = 'rgba(139,0,0,0.4)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 8; i++) {
      ctx.beginPath();
      ctx.moveTo(eyeX1, eyeY);
      ctx.quadraticCurveTo(eyeX1 - eyeR*(1+Math.random()), eyeY - eyeR*Math.random()*2, eyeX1 - eyeR*(1.5+Math.random()), eyeY - eyeR*(0.5+Math.random()));
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(eyeX2, eyeY);
      ctx.quadraticCurveTo(eyeX2 + eyeR*(1+Math.random()), eyeY - eyeR*Math.random()*2, eyeX2 + eyeR*(1.5+Math.random()), eyeY - eyeR*(0.5+Math.random()));
      ctx.stroke();
    }

    // Mouth - wide, too wide
    const mouthY = h/2 + faceH*0.22;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(w/2, mouthY, faceW*0.28, faceH*0.18, 0, 0, Math.PI*2);
    ctx.fill();

    // Teeth
    ctx.fillStyle = '#ddd';
    const teethCount = 12;
    for (let i = 0; i < teethCount; i++) {
      const tx = w/2 - faceW*0.25 + (faceW*0.5 * i/(teethCount-1));
      const ty = mouthY - faceH*0.08 + Math.random()*5;
      ctx.beginPath();
      ctx.moveTo(tx - 4, ty);
      ctx.lineTo(tx, ty + 15 + Math.random()*10);
      ctx.lineTo(tx + 4, ty);
      ctx.fill();
    }
    // Bottom teeth
    for (let i = 0; i < teethCount; i++) {
      const tx = w/2 - faceW*0.25 + (faceW*0.5 * i/(teethCount-1));
      const ty = mouthY + faceH*0.08;
      ctx.beginPath();
      ctx.moveTo(tx - 4, ty);
      ctx.lineTo(tx, ty - 12 - Math.random()*8);
      ctx.lineTo(tx + 4, ty);
      ctx.fill();
    }

    // Blood dripping from mouth
    ctx.fillStyle = 'rgba(139,0,0,0.8)';
    for (let i = 0; i < 5; i++) {
      const bx = w/2 + (Math.random()-0.5)*faceW*0.3;
      const by = mouthY + faceH*0.15;
      const len = 20 + Math.random()*60;
      ctx.beginPath();
      ctx.ellipse(bx, by + len/2, 3 + Math.random()*3, len/2, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }

  trigger(type='monster', duration=1.5) {
    if (this.cooldown > 0) return;
    this.cooldown = 4;

    const flash = document.getElementById('jumpscare-flash');
    const face = document.getElementById('monster-face');
    const ui = document.getElementById('ui-layer');

    this.audio.playJumpScareSound();

    // Flash
    flash.style.opacity = '1';
    flash.style.transition = 'none';

    // Screen shake
    ui.classList.add('shake');

    if (type === 'monster') {
      this.drawMonsterFace();
      face.style.display = 'block';
    }

    // Flash off quickly then face lingers
    setTimeout(() => {
      flash.style.transition = 'opacity 0.1s';
      flash.style.opacity = '0';
    }, 50);

    setTimeout(() => {
      face.style.display = 'none';
      ui.classList.remove('shake');
    }, duration * 1000);

    // Damage sanity
    return 25;
  }

  triggerAmbient() {
    // Subtle scare - no face, just sound and flash
    if (this.cooldown > 0) return;
    this.cooldown = 2;
    const flash = document.getElementById('jumpscare-flash');
    flash.style.background = '#8b0000';
    flash.style.opacity = '0.3';
    flash.style.transition = 'opacity 0.05s';
    this.audio.playNoise(0.3, 0.2);
    this.audio.playTone(150, 0.3, 'sawtooth', 0.2);
    setTimeout(() => {
      flash.style.opacity = '0';
      flash.style.background = '#fff';
    }, 100);
    return 5;
  }

  update(dt) {
    if (this.cooldown > 0) this.cooldown -= dt;
  }
}

// ============ INPUT MANAGER ============
class InputManager {
  constructor() {
    this.keys = {};
    this.mouse = { x: 0, y: 0, dx: 0, dy: 0, locked: false };
    this.sensitivity = 0.002;

    document.addEventListener('keydown', (e) => {
      this.keys[e.code] = true;
      if (e.code === 'Escape') this.unlockPointer();
    });
    document.addEventListener('keyup', (e) => this.keys[e.code] = false);

    document.addEventListener('mousemove', (e) => {
      if (this.mouse.locked) {
        this.mouse.dx += e.movementX * this.sensitivity;
        this.mouse.dy += e.movementY * this.sensitivity;
      }
    });

    document.addEventListener('click', () => {
      if (!this.mouse.locked && document.getElementById('game-screen').style.display !== 'none') {
        this.lockPointer();
      }
    });
  }

  lockPointer() {
    const canvas = document.getElementById('game-canvas');
    canvas.requestPointerLock = canvas.requestPointerLock || canvas.mozRequestPointerLock;
    canvas.requestPointerLock();
  }

  unlockPointer() {
    document.exitPointerLock = document.exitPointerLock || document.mozExitPointerLock;
    document.exitPointerLock();
  }

  isPressed(code) {
    return !!this.keys[code];
  }

  getMouseDelta() {
    const dx = this.mouse.dx;
    const dy = this.mouse.dy;
    this.mouse.dx = 0;
    this.mouse.dy = 0;
    return { dx, dy };
  }

  setSensitivity(val) {
    this.sensitivity = val * 0.0004;
  }
}

function buildLevel() {
  const walls = [];
  const floors = [];
  const doors = [];
  const items = [];

  // Helper to add wall
  function addWall(x, y, z, w, h, d, type='wall') {
    walls.push({ x, y, z, w, h, d, type, bbox: new THREE.Box3(
      new THREE.Vector3(x-w/2, y, z-d/2),
      new THREE.Vector3(x+w/2, y+h, z+d/2)
    )});
  }

  // Helper to add floor
  function addFloor(x, y, z, w, d) {
    floors.push({ x, y, z, w, d, bbox: new THREE.Box3(
      new THREE.Vector3(x-w/2, y-0.1, z-d/2),
      new THREE.Vector3(x+w/2, y+0.1, z+d/2)
    )});
  }

  // ===== FOREST (Starting area) =====
  // Ground
  addFloor(0, 0, 0, 80, 80);
  // Forest boundary walls (invisible collision barriers)
  addWall(0, 0, -40, 80, 5, 2, 'boundary');
  addWall(0, 0, 40, 80, 5, 2, 'boundary');
  addWall(-40, 0, 0, 2, 5, 80, 'boundary');
  addWall(40, 0, 0, 2, 5, 80, 'boundary');

  // Trees (collision cylinders approximated as boxes)
  const treePositions = [
    [-15, -12], [-20, 5], [-8, -20], [12, -15], [18, 8],
    [25, -5], [-25, 15], [5, 25], [-10, 18], [15, 20],
    [-30, -8], [30, 12], [-5, -30], [8, -25], [-18, -5],
    [22, 18], [-12, 22], [0, -18], [-22, -22], [10, 10]
  ];
  treePositions.forEach(([tx, tz]) => {
    addWall(tx, 0, tz, 1.2, 4, 1.2, 'tree');
  });

  // Rocks
  const rockPositions = [[-5, -8], [8, -5], [-12, 10], [15, -12], [5, 15]];
  rockPositions.forEach(([rx, rz]) => {
    addWall(rx, 0, rz, 1.5, 1, 1.5, 'rock');
  });

  // ===== CABIN EXTERIOR =====
  // Cabin at (-20, 0, -20)
  const cx = -20, cz = -20;
  // Cabin walls
  addWall(cx, 0, cz-4, 10, 4, 0.3, 'cabin_wall'); // back
  addWall(cx, 0, cz+4, 10, 4, 0.3, 'cabin_wall'); // front
  addWall(cx-5, 0, cz, 0.3, 4, 8, 'cabin_wall'); // left
  addWall(cx+5, 0, cz, 0.3, 4, 8, 'cabin_wall'); // right

  // Cabin floor (elevated slightly)
  addFloor(cx, 0.1, cz, 10, 8);

  // Cabin roof (collision so player can't jump over)
  addWall(cx, 4, cz, 10, 0.5, 8, 'roof');

  // Door (interactive)
  doors.push({
    x: cx, y: 0, z: cz+4,
    w: 2, h: 3.5, d: 0.3,
    rotation: 0,
    open: false,
    locked: true,
    key: 'cabin_key',
    name: 'Cabin Door',
    targetZone: 'cabin_main'
  });

  // ===== CABIN INTERIOR =====
  // Interior walls
  const ix = cx, iz = cz; // same position but we'll handle zone switching
  // Bedroom divider
  addWall(cx-2, 0.1, cz-1, 0.3, 4, 6, 'interior_wall');
  // Bedroom door
  doors.push({
    x: cx-2, y: 0.1, z: cz-1,
    w: 0.3, h: 3.5, d: 1.5,
    rotation: 0,
    open: false,
    locked: false,
    name: 'Bedroom Door',
    targetZone: 'cabin_bedroom',
    interior: true
  });

  // Basement door (in main room corner)
  doors.push({
    x: cx+3, y: 0.1, z: cz+3,
    w: 1.5, h: 3.5, d: 0.3,
    rotation: 0,
    open: false,
    locked: true,
    key: 'basement_key',
    name: 'Basement Door',
    targetZone: 'basement',
    interior: true
  });

  // ===== BASEMENT =====
  const bx = cx, bz = cz + 15;
  addFloor(bx, -3, bz, 12, 12);
  addWall(bx, -3, bz-6, 12, 5, 0.3, 'basement_wall');
  addWall(bx, -3, bz+6, 12, 5, 0.3, 'basement_wall');
  addWall(bx-6, -3, bz, 0.3, 5, 12, 'basement_wall');
  addWall(bx+6, -3, bz, 0.3, 5, 12, 'basement_wall');

  // Basement to cave tunnel
  doors.push({
    x: bx+6, y: -3, z: bz,
    w: 0.3, h: 3.5, d: 2,
    rotation: 0,
    open: false,
    locked: false,
    name: 'Tunnel',
    targetZone: 'cave',
    interior: true
  });

  // ===== CAVE =====
  const caveX = bx + 25, caveZ = bz;
  addFloor(caveX, -5, caveZ, 20, 20);
  // Cave walls (irregular)
  addWall(caveX-10, -5, caveZ, 0.5, 8, 20, 'cave_wall');
  addWall(caveX+10, -5, caveZ, 0.5, 8, 20, 'cave_wall');
  addWall(caveX, -5, caveZ-10, 20, 8, 0.5, 'cave_wall');
  addWall(caveX, -5, caveZ+10, 20, 8, 0.5, 'cave_wall');

  // Cave pillars
  addWall(caveX-5, -5, caveZ-5, 2, 8, 2, 'pillar');
  addWall(caveX+5, -5, caveZ+5, 2, 8, 2, 'pillar');

  // Exit to oak
  doors.push({
    x: caveX+10, y: -5, z: caveZ,
    w: 0.3, h: 4, d: 3,
    rotation: 0,
    open: false,

  });

  // ===== OLD OAK =====
  const ox = caveX + 30, oz = caveZ;
  addFloor(ox, 0, oz, 30, 30);
  // The Great Oak (massive collision)
  addWall(ox, 0, oz, 6, 15, 6, 'oak_tree');

  addWall(ox, 0, oz-15, 30, 5, 1, 'boundary');
  addWall(ox, 0, oz+15, 30, 5, 1, 'boundary');
  addWall(ox-15, 0, oz, 1, 5, 30, 'boundary');
  addWall(ox+15, 0, oz, 1, 5, 30, 'boundary');

  // ===== ITEMS =====
  items.push({
    x: 12, y: 0.5, z: 8,
    type: 'key', keyType: 'cabin_key',
    name: 'Rusty Key', mesh: null,
    glow: 0xff0000, pickedUp: false
  });
  items.push({
    x: cx-3, y: 0.5, z: cz-2,
    type: 'key', keyType: 'basement_key',
    name: 'Basement Key', mesh: null,
    glow: 0xff4400, pickedUp: false
  });
  items.push({
    x: caveX, y: -4.5, z: caveZ,
    type: 'amulet',
    name: 'Amulet of Shadows', mesh: null,
    glow: 0x6600ff, pickedUp: false
  });
  items.push({
    x: 5, y: 0.5, z: -10,
    type: 'note',
    name: 'Bloody Note', mesh: null,
    glow: 0xaa0000, pickedUp: false
  });
  items.push({
    x: cx+2, y: 0.5, z: cz+1,
    type: 'health',
    name: 'Healing Potion', mesh: null,
    glow: 0x00ff00, pickedUp: false
  });

  return { walls, floors, doors, items, treePositions, rockPositions };
}

// ============ MONSTER CLASS ============
class Monster {
  constructor(type, startPos, scene) {
    this.type = type;
    this.position = new THREE.Vector3(startPos.x, startPos.y, startPos.z);
    this.velocity = new THREE.Vector3();
    this.scene = scene;
    this.state = 'patrol'; // patrol, chase, attack, search, dead
    this.patrolIndex = 0;
    this.patrolPoints = this.generatePatrol();
    this.detectionRange = type === 'stalker' ? 15 : type === 'crawler' ? 12 : 20;
    this.attackRange = 2;
    this.speed = type === 'stalker' ? 2.5 : type === 'crawler' ? 5 : 1;
    this.chaseSpeed = type === 'stalker' ? 5 : type === 'crawler' ? 8 : 3;
    this.damage = type === 'stalker' ? 35 : type === 'crawler' ? 20 : 15;
    this.attackCooldown = 0;
    this.searchTimer = 0;
    this.lastSeenPlayer = new THREE.Vector3();
    this.mesh = null;
    this.createMesh();
  }

  generatePatrol() {
    const points = [];
    for (let i = 0; i < 4; i++) {
      points.push(new THREE.Vector3(
        this.position.x + (Math.random() - 0.5) * 20,
        this.position.y,
        this.position.z + (Math.random() - 0.5) * 20
      ));
    }
    return points;
  }

  createMesh() {
    const group = new THREE.Group();

    if (this.type === 'stalker') {
      // Tall slender figure
      const bodyGeo = new THREE.CylinderGeometry(0.3, 0.4, 4, 8);
      const bodyMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.9 });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 2;
      group.add(body);

      // Head
      const headGeo = new THREE.SphereGeometry(0.35, 8, 8);
      const headMat = new THREE.MeshStandardMaterial({ color: 0x111, roughness: 0.5 });
      const head = new THREE.Mesh(headGeo, headMat);
      head.position.y = 4.2;
      group.add(head);

      // Arms (long)
      const armGeo = new THREE.CylinderGeometry(0.08, 0.08, 3.5, 4);
      const armMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a });
      const leftArm = new THREE.Mesh(armGeo, armMat);
      leftArm.position.set(-0.5, 2.5, 0);
      leftArm.rotation.z = 0.2;
      group.add(leftArm);
      const rightArm = new THREE.Mesh(armGeo, armMat);
      rightArm.position.set(0.5, 2.5, 0);
      rightArm.rotation.z = -0.2;
      group.add(rightArm);

      // Glowing eyes
      const eyeGeo = new THREE.SphereGeometry(0.06, 4, 4);
      const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
      const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
      leftEye.position.set(-0.12, 4.25, 0.25);
      group.add(leftEye);
      const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
      rightEye.position.set(0.12, 4.25, 0.25);
      group.add(rightEye);

    } else if (this.type === 'crawler') {
      // Low, fast creature
      const bodyGeo = new THREE.BoxGeometry(1.2, 0.6, 2);
      const bodyMat = new THREE.MeshStandardMaterial({ color: 0x1a0505 });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 0.3;
      group.add(body);

      // Head
      const headGeo = new THREE.ConeGeometry(0.3, 0.8, 4);
      const head = new THREE.Mesh(headGeo, bodyMat);
      head.position.set(0, 0.4, 1.2);
      head.rotation.x = Math.PI / 2;
      group.add(head);

      // Legs
      for (let i = 0; i < 4; i++) {
        const legGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.8, 4);
        const leg = new THREE.Mesh(legGeo, bodyMat);
        leg.position.set((i < 2 ? -0.4 : 0.4), 0.2, (i % 2 === 0 ? 0.6 : -0.6));
        leg.rotation.x = 0.5;
        group.add(leg);
      }

      // Glowing eyes
      const eyeGeo = new THREE.SphereGeometry(0.05, 4, 4);
      const eyeMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
      const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
      leftEye.position.set(-0.15, 0.5, 1.35);
      group.add(leftEye);
      const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
      rightEye.position.set(0.15, 0.5, 1.35);
      group.add(rightEye);

    } else if (this.type === 'watcher') {
      // Ghostly apparition
      const geo = new THREE.SphereGeometry(0.8, 8, 8);
      const mat = new THREE.MeshBasicMaterial({
        color: 0x4400aa, transparent: true, opacity: 0.3
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.y = 1.5;
      group.add(mesh);

      // Inner core
      const coreGeo = new THREE.SphereGeometry(0.3, 6, 6);
      const coreMat = new THREE.MeshBasicMaterial({ color: 0x220066 });
      const core = new THREE.Mesh(coreGeo, coreMat);
      core.position.y = 1.5;
      group.add(core);
    }

    group.position.copy(this.position);
    this.scene.add(group);
    this.mesh = group;
  }

  update(dt, player, walls) {
    if (this.state === 'dead') return;

    const dist = this.position.distanceTo(player.position);
    const canSee = dist < this.detectionRange && this.hasLineOfSight(player.position, walls);

    // State machine
    if (this.state === 'patrol') {
      if (canSee) {
        this.state = 'chase';
        this.lastSeenPlayer.copy(player.position);
        // JUMP SCARE: monster first sees player
        if (dist < 8 && Math.random() > 0.5) {
          return 'jumpscare';
        }
      } else {
        this.patrol(dt);
      }
    } else if (this.state === 'chase') {
      if (canSee) {
        this.lastSeenPlayer.copy(player.position);
        this.moveToward(player.position, this.chaseSpeed, dt, walls);
        if (dist < this.attackRange) {
          this.state = 'attack';
        }
      } else {
        this.state = 'search';
        this.searchTimer = 5;
      }
    } else if (this.state === 'search') {
      this.searchTimer -= dt;
      if (canSee) {
        this.state = 'chase';
      } else if (this.searchTimer <= 0) {
        this.state = 'patrol';
      } else {
        this.moveToward(this.lastSeenPlayer, this.speed * 0.5, dt, walls);
      }
    } else if (this.state === 'attack') {
      this.attackCooldown -= dt;
      if (dist > this.attackRange + 1) {
        this.state = 'chase';
      } else if (this.attackCooldown <= 0) {
        this.attackCooldown = 1.5;
        return 'attack';
      }
    }

    // Update mesh
    if (this.mesh) {
      this.mesh.position.copy(this.position);
      // Face player or movement direction
      const target = this.state === 'patrol' ? this.patrolPoints[this.patrolIndex] : player.position;
      this.mesh.lookAt(target.x, this.position.y, target.z);

      // Animation
      if (this.type === 'crawler') {
        this.mesh.position.y = 0.3 + Math.sin(Date.now() * 0.01) * 0.1;
      } else if (this.type === 'watcher') {
        this.mesh.position.y = 1.5 + Math.sin(Date.now() * 0.002) * 0.5;
        this.mesh.rotation.y += dt * 0.5;
        this.mesh.children[0].material.opacity = 0.2 + Math.sin(Date.now() * 0.003) * 0.15;
      }
    }

    return null;
  }

  patrol(dt) {
    const target = this.patrolPoints[this.patrolIndex];
    const dist = this.position.distanceTo(target);
    if (dist < 1) {
      this.patrolIndex = (this.patrolIndex + 1) % this.patrolPoints.length;
    } else {
      this.moveToward(target, this.speed * 0.5, dt, []);
    }
  }

  moveToward(target, speed, dt, walls) {
    const dir = new THREE.Vector3().subVectors(target, this.position);
    dir.y = 0;
    const dist = dir.length();
    if (dist > 0.1) {
      dir.normalize();
      const move = dir.multiplyScalar(speed * dt);
      // Simple collision: try move, if wall hit, don't move
      const newPos = this.position.clone().add(move);
      if (!this.checkWallCollision(newPos, walls)) {
        this.position.copy(newPos);
      } else {
        // Slide along wall
        const moveX = new THREE.Vector3(move.x, 0, 0);
        const testX = this.position.clone().add(moveX);
        if (!this.checkWallCollision(testX, walls)) this.position.copy(testX);
        else {
          const moveZ = new THREE.Vector3(0, 0, move.z);
          const testZ = this.position.clone().add(moveZ);
          if (!this.checkWallCollision(testZ, walls)) this.position.copy(testZ);
        }
      }
    }
  }

  checkWallCollision(pos, walls) {
    const myBox = new THREE.Box3(
      new THREE.Vector3(pos.x - 0.5, pos.y, pos.z - 0.5),
      new THREE.Vector3(pos.x + 0.5, pos.y + 2, pos.z + 0.5)
    );
    for (const w of walls) {
      if (w.bbox && myBox.intersectsBox(w.bbox)) return true;
    }
    return false;
  }

  hasLineOfSight(targetPos, walls) {
    // Simple ray check - just distance for now, with height check
    const dist = this.position.distanceTo(targetPos);
    if (dist > this.detectionRange) return false;
    // Check if player is in front (dot product)
    const dirToPlayer = new THREE.Vector3().subVectors(targetPos, this.position).normalize();
    const facing = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), this.mesh ? this.mesh.rotation.y : 0);
    const dot = facing.dot(dirToPlayer);
    // 180 degree vision for stalker, 270 for others
    const fov = this.type === 'stalker' ? -0.5 : -0.8;
    if (dot < fov) return false; // behind monster
    return true;
  }

  takeDamage(amount) {
    // Some monsters can't be killed
    if (this.type === 'watcher') return false;
    // For now monsters are unkillable (it's horror!)
    return false;
  }
}

// ============ PLAYER CONTROLLER ============
class PlayerController {
  constructor(camera, input, audio) {
    this.camera = camera;
    this.input = input;
    this.audio = audio;
    this.position = new THREE.Vector3(0, 1.7, 10);
    this.velocity = new THREE.Vector3();
    this.rotation = new THREE.Euler(0, 0, 0, 'YXZ');
    this.height = 1.7;
    this.crouchHeight = 0.9;
    this.currentHeight = this.height;
    this.speed = 4;
    this.runSpeed = 7;
    this.crouchSpeed = 1.5;
    this.currentSpeed = this.speed;
    this.stamina = 100;
    this.maxStamina = 100;
    this.staminaRegen = 20;
    this.staminaDrain = 30;
    this.health = 100;
    this.maxHealth = 100;
    this.sanity = 100;
    this.maxSanity = 100;
    this.flashlight = {
      on: true,
      battery: 100,
      drainRate: 5,
      light: null
    };
    this.inventory = [];
    this.keys = [];
    this.isCrouching = false;
    this.isRunning = false;
    this.onGround = true;
    this.gravity = -18;
    this.jumpForce = 6;
    this.verticalVelocity = 0;
    this.interactionRange = 3;
    this.currentZone = 'forest';
    this.invulnerable = 0;
    this.bobPhase = 0;
    this.breathPhase = 0;
  }

  initFlashlight(scene) {
    this.flashlight.light = new THREE.SpotLight(0xffffee, 1.5, 25, Math.PI / 5, 0.5, 1);
    this.flashlight.light.position.set(0, 0, 0);
    this.flashlight.light.castShadow = true;
    this.flashlight.light.shadow.mapSize.width = 512;
    this.flashlight.light.shadow.mapSize.height = 512;
    this.camera.add(this.flashlight.light);
    this.flashlight.light.target.position.set(0, 0, -10);
    this.camera.add(this.flashlight.light.target);
  }

  update(dt, walls, floors, doors, items, monsters) {
    this.handleMouseLook(dt);
    this.handleMovement(dt, walls, floors);
    this.handleActions(dt, doors, items, monsters);
    this.updateStats(dt);
    this.updateCameraEffects(dt);
    this.checkMonsterCollisions(monsters);
    this.checkZone(walls);
  }

  handleMouseLook(dt) {
    const mouse = this.input.getMouseDelta();
    this.rotation.y -= mouse.dx;
    this.rotation.x -= mouse.dy;
    this.rotation.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, this.rotation.x));
    this.camera.rotation.copy(this.rotation);
  }

  handleMovement(dt, walls, floors) {
    const forward = this.input.isPressed('KeyW') || this.input.isPressed('ArrowUp');
    const backward = this.input.isPressed('KeyS') || this.input.isPressed('ArrowDown');
    const left = this.input.isPressed('KeyA') || this.input.isPressed('ArrowLeft');
    const right = this.input.isPressed('KeyD') || this.input.isPressed('ArrowRight');
    const run = this.input.isPressed('ShiftLeft') || this.input.isPressed('ShiftRight');
    const crouch = this.input.isPressed('ControlLeft') || this.input.isPressed('KeyC');
    const jump = this.input.isPressed('Space');

    // Crouch
    this.isCrouching = crouch;
    const targetHeight = this.isCrouching ? this.crouchHeight : this.height;
    this.currentHeight += (targetHeight - this.currentHeight) * 5 * dt;

    // Run
    this.isRunning = run && forward && this.stamina > 0 && !this.isCrouching;
    if (this.isRunning) {
      this.currentSpeed = this.runSpeed;
      this.stamina -= this.staminaDrain * dt;
    } else {
      this.currentSpeed = this.isCrouching ? this.crouchSpeed : this.speed;
      this.stamina = Math.min(this.maxStamina, this.stamina + this.staminaRegen * dt);
    }

    // Movement direction
    const moveDir = new THREE.Vector3();
    if (forward) moveDir.z -= 1;
    if (backward) moveDir.z += 1;
    if (left) moveDir.x -= 1;
    if (right) moveDir.x += 1;

    if (moveDir.length() > 0) {
      moveDir.normalize();
      // Rotate by camera yaw
      moveDir.applyAxisAngle(new THREE.Vector3(0, 1, 0), this.rotation.y);

      // Try move X
      const newPosX = this.position.clone();
      newPosX.x += moveDir.x * this.currentSpeed * dt;
      if (!this.checkCollision(newPosX, walls)) {
        this.position.x = newPosX.x;
      }

      // Try move Z
      const newPosZ = this.position.clone();
      newPosZ.z += moveDir.z * this.currentSpeed * dt;
      if (!this.checkCollision(newPosZ, walls)) {
        this.position.z = newPosZ.z;
      }

      // Footsteps
      this.bobPhase += dt * (this.isRunning ? 15 : 8);
      if (Math.sin(this.bobPhase) > 0.95 && Math.sin(this.bobPhase - 0.1) <= 0.95) {
        this.audio.playFootstep(this.isRunning, this.isCrouching);
      }
    }

    // Gravity / Jump
    if (jump && this.onGround) {
      this.verticalVelocity = this.jumpForce;
      this.onGround = false;
    }

    this.verticalVelocity += this.gravity * dt;
    this.position.y += this.verticalVelocity * dt;

    // Floor collision
    let floorY = -100;
    for (const f of floors) {
      if (f.bbox && this.position.x >= f.bbox.min.x && this.position.x <= f.bbox.max.x &&
          this.position.z >= f.bbox.min.z && this.position.z <= f.bbox.max.z) {
        floorY = Math.max(floorY, f.bbox.max.y);
      }
    }

    if (this.position.y <= floorY + this.currentHeight) {
      this.position.y = floorY + this.currentHeight;
      this.verticalVelocity = 0;
      this.onGround = true;
    }

    // Update camera
    this.camera.position.copy(this.position);
    this.camera.position.y = this.position.y + Math.sin(this.bobPhase) * 0.05;

    // Flashlight toggle
    if (this.input.isPressed('KeyF')) {
      this.flashlight.on = !this.flashlight.on;
      this.flashlight.light.intensity = this.flashlight.on ? 1.5 : 0;
      // Prevent key repeat
      this.input.keys['KeyF'] = false;
    }
  }

  checkCollision(pos, walls) {
    const playerBox = new THREE.Box3(
      new THREE.Vector3(pos.x - 0.3, pos.y, pos.z - 0.3),
      new THREE.Vector3(pos.x + 0.3, pos.y + this.currentHeight, pos.z + 0.3)
    );
    for (const w of walls) {
      if (w.bbox && w.type !== 'tree' && w.type !== 'rock' && playerBox.intersectsBox(w.bbox)) {
        return true;
      }
    }
    // Tree/rock collision (cylinder approx)
    for (const w of walls) {
      if ((w.type === 'tree' || w.type === 'rock') && w.bbox) {
        const dx = pos.x - w.x;
        const dz = pos.z - w.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        if (dist < (w.w/2 + 0.3)) return true;
      }
    }
    return false;
  }

  handleActions(dt, doors, items, monsters) {
    // Interaction
    if (this.input.isPressed('KeyE')) {
      this.tryInteract(doors, items);
      this.input.keys['KeyE'] = false;
    }

    // Update flashlight battery
    if (this.flashlight.on) {
      this.flashlight.battery -= this.flashlight.drainRate * dt;
      if (this.flashlight.battery <= 0) {
        this.flashlight.battery = 0;
        this.flashlight.on = false;
        this.flashlight.light.intensity = 0;
      }
    }

    // Show interaction prompt
    const prompt = document.getElementById('interaction-prompt');
    let nearest = null;
    let nearestDist = Infinity;

    for (const d of doors) {
      const dist = Math.sqrt((this.position.x - d.x)**2 + (this.position.z - d.z)**2);
      if (dist < this.interactionRange && dist < nearestDist) {
        nearest = d;
        nearestDist = dist;
      }
    }
    for (const i of items) {
      if (i.pickedUp) continue;
      const dist = Math.sqrt((this.position.x - i.x)**2 + (this.position.z - i.z)**2);
      if (dist < this.interactionRange && dist < nearestDist) {
        nearest = i;
        nearestDist = dist;
      }
    }

    if (nearest) {
      let text = '';
      if (nearest.name) {
        text = '[E] ' + nearest.name;
        if (nearest.locked) text += ' (LOCKED)';
      }
      prompt.textContent = text;
      prompt.style.opacity = '1';
    } else {
      prompt.style.opacity = '0';
    }
  }

  tryInteract(doors, items) {
    // Check doors
    for (const d of doors) {
      const dist = Math.sqrt((this.position.x - d.x)**2 + (this.position.z - d.z)**2);
      if (dist < this.interactionRange) {
        if (d.locked) {
          if (this.keys.includes(d.key)) {
            d.locked = false;
            this.audio.playDoorCreak();
            this.audio.speak('The door is unlocked.', true);
          } else {
            this.audio.speak('Locked. I need a key.', true);
            this.audio.playTone(150, 0.3, 'square', 0.15);
          }
        } else {
          d.open = !d.open;
          this.audio.playDoorCreak();
          if (d.targetZone) {
            this.currentZone = d.targetZone;
            this.audio.speak('Entering ' + d.targetZone.replace('_', ' '), false);
          }
        }
        return;
      }
    }

    // Check items
    for (const i of items) {
      if (i.pickedUp) continue;
      const dist = Math.sqrt((this.position.x - i.x)**2 + (this.position.z - i.z)**2);
      if (dist < this.interactionRange) {
        i.pickedUp = true;
        if (i.type === 'key') {
          this.keys.push(i.keyType);
          this.audio.speak('Found a key.', true);
        } else if (i.type === 'amulet') {
          this.inventory.push('Amulet of Shadows');
          this.audio.speak('The amulet... it burns cold.', true);
        } else if (i.type === 'health') {
          this.health = Math.min(this.maxHealth, this.health + 40);
          this.audio.speak('Health restored.', true);
        } else if (i.type === 'note') {
          this.inventory.push('Bloody Note');
          this.audio.speak('A note... written in blood.', true);
        }
        // Hide mesh
        if (i.mesh) {
          i.mesh.visible = false;
        }
        this.updateInventoryUI();
        return;
      }
    }
  }

  checkMonsterCollisions(monsters) {
    if (this.invulnerable > 0) {
      this.invulnerable -= 0.016;
      return;
    }

    for (const m of monsters) {
      if (m.state === 'dead') continue;
      const dist = this.position.distanceTo(m.position);
      if (dist < 1.5) {
        // Take damage
        this.health -= m.damage;
        this.invulnerable = 1.5;
        this.sanity -= 10;

        // Knockback
        const knockDir = new THREE.Vector3().subVectors(this.position, m.position).normalize();
        this.position.add(knockDir.multiplyScalar(2));

        // Screen effects
        const dmgOverlay = document.getElementById('damage-overlay');
        dmgOverlay.style.opacity = '0.8';
        setTimeout(() => { dmgOverlay.style.opacity = '0'; }, 300);

        document.body.classList.add('shake');
        setTimeout(() => document.body.classList.remove('shake'), 500);

        this.audio.playScream();
        this.audio.speak('It got me!', true);

        // Check death
        if (this.health <= 0) {
          this.die(m.type);
        }
        break;
      }
    }
  }

  checkZone(walls) {
    // Simple zone detection based on position
    const x = this.position.x;
    const z = this.position.z;

    if (x < -15 && x > -25 && z < -15 && z > -25) {
      this.currentZone = 'cabin_exterior';
    } else if (x < -15 && x > -25 && z < -17 && z > -23 && this.position.y > 0.5) {
      this.currentZone = 'cabin_main';
    } else if (this.position.y < -2) {
      this.currentZone = 'basement';
    } else if (this.position.y < -4) {
      this.currentZone = 'cave';
    }
  }

  updateStats(dt) {
    // Sanity drain in dark / near monsters
    let sanityDrain = 0;
    if (!this.flashlight.on) sanityDrain += 2;
    if (this.currentZone === 'basement' || this.currentZone === 'cave') sanityDrain += 3;

    this.sanity -= sanityDrain * dt;
    this.sanity = Math.max(0, Math.min(this.maxSanity, this.sanity));

    // Low sanity effects
    if (this.sanity < 30) {
      document.body.classList.add('sanity-low');
      if (Math.random() < 0.005) {
        this.audio.playWhisper();
      }
    } else {
      document.body.classList.remove('sanity-low');
    }

    // Update UI
    document.getElementById('health-fill').style.width = (this.health / this.maxHealth * 100) + '%';
    document.getElementById('sanity-fill').style.width = (this.sanity / this.maxSanity * 100) + '%';
    document.getElementById('stamina-fill').style.width = (this.stamina / this.maxStamina * 100) + '%';
    document.getElementById('battery-fill').style.width = (this.flashlight.battery / 100 * 100) + '%';
    document.getElementById('health').textContent = Math.ceil(this.health);
    document.getElementById('sanity').textContent = Math.ceil(this.sanity);

    // Battery warning
    const battOuter = document.getElementById('battery-outer');
    if (this.flashlight.battery < 20) {
      battOuter.classList.add('battery-low');
    } else {
      battOuter.classList.remove('battery-low');
    }

    // Objective
    const obj = document.getElementById('objective');
    if (this.keys.includes('cabin_key') && !this.keys.includes('basement_key')) {
      obj.textContent = 'ENTER THE CABIN';
    } else if (this.keys.includes('basement_key') && this.inventory.indexOf('Amulet of Shadows') === -1) {
      obj.textContent = 'FIND THE AMULET';
    } else if (this.inventory.indexOf('Amulet of Shadows') >= 0) {
      obj.textContent = 'ESCAPE THE DARKWOOD';
    }
  }

  updateCameraEffects(dt) {
    // Breath fog at low stamina
    if (this.stamina < 20) {
      this.breathPhase += dt * 2;
    }
  }

  updateInventoryUI() {
    const container = document.getElementById('quick-inventory');
    container.innerHTML = '';
    this.inventory.forEach(item => {
      const div = document.createElement('div');
      div.className = 'inv-item';
      div.textContent = item;
      container.appendChild(div);
    });
    this.keys.forEach(key => {
      const div = document.createElement('div');
      div.className = 'inv-item';
      div.textContent = 'KEY: ' + key;
      div.style.borderColor = '#8b0000';
      container.appendChild(div);
    });
  }

  die(cause) {
    const screen = document.getElementById('gameover-screen');
    const reason = document.getElementById('gameover-reason');
    const audio = this.audio;

    audio.playScream();
    audio.stopAmbientDrone();
    audio.stopHeartbeat();

    const reasons = {
      stalker: 'The Stalker dragged you into the trees.',
      crawler: 'The Crawler fed on your screams.',
      watcher: 'The Watcher consumed your soul.',
      default: 'The forest has claimed you.'
    };
    reason.textContent = reasons[cause] || reasons.default;

    // Death camera animation
    screen.style.display = 'flex';
    document.exitPointerLock();
  }
}

// ============ GAME ENGINE ============
class GameEngine {
  constructor() {
    this.canvas = document.getElementById('game-canvas');
    this.renderer = new THREE.WebGLRenderer({ canvas: this.canvas, antialias: true });
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.shadowMap.enabled = true;
    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
    this.renderer.toneMappingExposure = 0.4;

    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x020202);
    this.scene.fog = new THREE.FogExp2(0x020202, 0.04);

    this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
    this.camera.position.set(0, 1.7, 10);

    this.input = new InputManager();
    this.audio = new AudioManager();
    this.jumpscare = new JumpScareManager(this.audio);
    this.player = new PlayerController(this.camera, this.input, this.audio);

    this.levelData = buildLevel();
    this.walls = this.levelData.walls;
    this.floors = this.levelData.floors;
    this.doors = this.levelData.doors;
    this.items = this.levelData.items;
    this.monsters = [];

    this.clock = new THREE.Clock();
    this.isRunning = false;
    this.isPaused = false;
    this.timeInZone = 0;
    this.ambientTimer = 0;
    this.chaseMusicActive = false;

    this.buildWorld();
    this.setupLighting();
    this.player.initFlashlight(this.scene);
    this.spawnMonsters();
    this.createItemMeshes();

    window.addEventListener('resize', () => this.onResize());
    document.addEventListener('pointerlockchange', () => {
      this.input.mouse.locked = !!document.pointerLockElement;
    });

    // Loading
    this.simulateLoading();
  }

  simulateLoading() {
    const bar = document.getElementById('loading-fill');
    let progress = 0;
    const interval = setInterval(() => {
      progress += Math.random() * 15;
      if (progress >= 100) {
        progress = 100;
        clearInterval(interval);
        setTimeout(() => {
          document.getElementById('loading').style.display = 'none';
        }, 500);
      }
      bar.style.width = progress + '%';
    }, 200);
  }

  buildWorld() {
    // Materials
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x1a0a0a, roughness: 0.95 });
    const cabinMat = new THREE.MeshStandardMaterial({ color: 0x2a1a0a, roughness: 0.9 });
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.95 });
    const treeMat = new THREE.MeshStandardMaterial({ color: 0x0d0d0d, roughness: 0.95 });
    const rockMat = new THREE.MeshStandardMaterial({ color: 0x111, roughness: 0.9 });
    const basementMat = new THREE.MeshStandardMaterial({ color: 0x0a0505, roughness: 0.95 });
    const caveMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.98 });

    // Build walls
    this.walls.forEach(w => {
      let mat = wallMat;
      if (w.type === 'cabin_wall' || w.type === 'interior_wall') mat = cabinMat;
      if (w.type === 'basement_wall') mat = basementMat;
      if (w.type === 'cave_wall' || w.type === 'pillar') mat = caveMat;
      if (w.type === 'tree') mat = treeMat;
      if (w.type === 'rock') mat = rockMat;

      const geo = new THREE.BoxGeometry(w.w, w.h, w.d);
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(w.x, w.y + w.h/2, w.z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      this.scene.add(mesh);
    });

    // Build floors
    this.floors.forEach(f => {
      const geo = new THREE.PlaneGeometry(f.w, f.d);
      const mesh = new THREE.Mesh(geo, floorMat);
      mesh.rotation.x = -Math.PI / 2;
      mesh.position.set(f.x, f.y, f.z);
      mesh.receiveShadow = true;
      this.scene.add(mesh);
    });

    // Build doors
    this.doors.forEach(d => {
      const geo = new THREE.BoxGeometry(d.w, d.h, d.d);
      const mat = new THREE.MeshStandardMaterial({ color: 0x3a1a0a });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(d.x, d.y + d.h/2, d.z);
      mesh.castShadow = true;
      this.scene.add(mesh);
      d.mesh = mesh;
    });

    // Trees (visual only - already have collision)
    this.levelData.treePositions.forEach(([tx, tz]) => {
      const trunkGeo = new THREE.CylinderGeometry(0.4, 0.5, 5 + Math.random()*3, 6);
      const trunk = new THREE.Mesh(trunkGeo, treeMat);
      trunk.position.set(tx, 2.5, tz);
      trunk.castShadow = true;
      this.scene.add(trunk);

      // Canopy (dark)
      const canopyGeo = new THREE.SphereGeometry(2 + Math.random(), 4, 4);
      const canopyMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 1 });
      const canopy = new THREE.Mesh(canopyGeo, canopyMat);
      canopy.position.set(tx, 5 + Math.random(), tz);
      canopy.scale.y = 0.6;
      this.scene.add(canopy);
    });

    // Rocks
    this.levelData.rockPositions.forEach(([rx, rz]) => {
      const geo = new THREE.DodecahedronGeometry(0.8 + Math.random()*0.5, 0);
      const mesh = new THREE.Mesh(geo, rockMat);
      mesh.position.set(rx, 0.4, rz);
      mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
      mesh.castShadow = true;
      this.scene.add(mesh);
    });

    // Cabin roof
    const roofGeo = new THREE.ConeGeometry(6, 3, 4);
    const roofMat = new THREE.MeshStandardMaterial({ color: 0x1a0a0a });
    const roof = new THREE.Mesh(roofGeo, roofMat);
    roof.position.set(-20, 5.5, -20);
    roof.rotation.y = Math.PI / 4;
    this.scene.add(roof);

    // Cabin windows (glow)
    const winGeo = new THREE.PlaneGeometry(0.8, 0.8);
    const winMat = new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.2 });
    const win1 = new THREE.Mesh(winGeo, winMat);
    win1.position.set(-17, 2.5, -16);
    this.scene.add(win1);

    // Dead trees
    for (let i = 0; i < 10; i++) {
      const h = 3 + Math.random() * 3;
      const geo = new THREE.CylinderGeometry(0.08, 0.2, h, 4);
      const mesh = new THREE.Mesh(geo, treeMat);
      const angle = Math.random() * Math.PI * 2;
      const dist = 8 + Math.random() * 20;
      mesh.position.set(Math.cos(angle)*dist, h/2, Math.sin(angle)*dist);
      mesh.rotation.z = (Math.random()-0.5)*0.3;
      this.scene.add(mesh);
    }

    // Particles (mist)
    this.createMist();

    // Blood decals (scattered)
    for (let i = 0; i < 8; i++) {
      const geo = new THREE.CircleGeometry(0.3 + Math.random()*0.5, 6);
      const mat = new THREE.MeshBasicMaterial({ color: 0x440000, transparent: true, opacity: 0.6 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = -Math.PI/2;
      mesh.position.set((Math.random()-0.5)*50, 0.02, (Math.random()-0.5)*50);
      this.scene.add(mesh);
    }
  }

  createMist() {
    const count = 300;
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
      pos[i*3] = (Math.random()-0.5)*60;
      pos[i*3+1] = Math.random()*3;
      pos[i*3+2] = (Math.random()-0.5)*60;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({
      color: 0x444466, size: 0.08, transparent: true, opacity: 0.3
    });
    this.mist = new THREE.Points(geo, mat);
    this.scene.add(this.mist);
  }

  createItemMeshes() {
    this.items.forEach(item => {
      let geo, mat;
      if (item.type === 'key') {
        geo = new THREE.TorusGeometry(0.15, 0.04, 8, 16);
        mat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8, roughness: 0.3 });
      } else if (item.type === 'amulet') {
        geo = new THREE.OctahedronGeometry(0.2, 0);
        mat = new THREE.MeshStandardMaterial({ color: 0x6600ff, emissive: 0x220044, emissiveIntensity: 0.5 });
      } else if (item.type === 'health') {
        geo = new THREE.CylinderGeometry(0.1, 0.1, 0.3, 8);
        mat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x004400, transparent: true, opacity: 0.8 });
      } else {
        geo = new THREE.BoxGeometry(0.2, 0.3, 0.02);
        mat = new THREE.MeshStandardMaterial({ color: 0xaa0000 });
      }
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(item.x, item.y, item.z);
      this.scene.add(mesh);
      item.mesh = mesh;

      // Glow light
      if (item.glow) {
        const light = new THREE.PointLight(item.glow, 0.5, 3);
        light.position.copy(mesh.position);
        this.scene.add(light);
        item.light = light;
      }
    });
  }

  setupLighting() {
    // Moonlight
    const moon = new THREE.DirectionalLight(0x334466, 0.3);
    moon.position.set(20, 30, -10);
    moon.castShadow = true;
    moon.shadow.camera.left = -30;
    moon.shadow.camera.right = 30;
    moon.shadow.camera.top = 30;
    moon.shadow.camera.bottom = -30;
    moon.shadow.mapSize.width = 2048;
    moon.shadow.mapSize.height = 2048;
    this.scene.add(moon);

    // Ambient
    const ambient = new THREE.AmbientLight(0x110505, 0.15);
    this.scene.add(ambient);

    // Cabin fire light
    const fire = new THREE.PointLight(0xff4400, 1, 15);
    fire.position.set(-20, 1, -20);
    fire.castShadow = true;
    this.scene.add(fire);
    this.fireLight = fire;

    // Basement red light
    const red = new THREE.PointLight(0xff0000, 0.3, 10);
    red.position.set(-20, -2, -5);
    this.scene.add(red);
  }

  spawnMonsters() {
    // Stalkers in forest
    this.monsters.push(new Monster('stalker', { x: -10, y: 0, z: -10 }, this.scene));
    this.monsters.push(new Monster('stalker', { x: 15, y: 0, z: -15 }, this.scene));
    this.monsters.push(new Monster('stalker', { x: -5, y: 0, z: 20 }, this.scene));

    // Crawlers in cabin/basement
    this.monsters.push(new Monster('crawler', { x: -20, y: 0.3, z: -20 }, this.scene));
    this.monsters.push(new Monster('crawler', { x: -20, y: -3, z: -5 }, this.scene));

    // Watcher in cave
    this.monsters.push(new Monster('watcher', { x: 5, y: -4, z: 10 }, this.scene));
  }

  start() {
    this.isRunning = true;
    this.audio.startAmbientDrone();
    this.audio.speak('The forest knows you are here.', true);
    this.animate();
  }

  animate() {
    if (!this.isRunning) return;
    requestAnimationFrame(() => this.animate());

    const dt = Math.min(this.clock.getDelta(), 0.1);
    if (this.isPaused) return;

    // Update player
    this.player.update(dt, this.walls, this.floors, this.doors, this.items, this.monsters);

    // Update monsters
    let chasing = false;
    this.monsters.forEach(m => {
      const result = m.update(dt, this.player, this.walls);
      if (result === 'jumpscare') {
        const dmg = this.jumpscare.trigger('monster', 1.5);
        this.player.sanity -= dmg;
      }
      if (result === 'attack') {
        // Monster attacks from range
        this.player.health -= m.damage * 0.5;
        this.player.sanity -= 15;
        const dmgOverlay = document.getElementById('damage-overlay');
        dmgOverlay.style.opacity = '0.6';
        setTimeout(() => { dmgOverlay.style.opacity = '0'; }, 200);
        this.audio.playMonsterGrowl(0);
      }
      if (m.state === 'chase' || m.state === 'attack') chasing = true;
    });

    // Chase music
    if (chasing && !this.chaseMusicActive) {
      this.chaseMusicActive = true;
      this.audio.startHeartbeat(2);
    } else if (!chasing && this.chaseMusicActive) {
      this.chaseMusicActive = false;
      this.audio.stopHeartbeat();
    }

    // Update mist
    if (this.mist) {
      const positions = this.mist.geometry.attributes.position.array;
      for (let i = 0; i < positions.length; i += 3) {
        positions[i+1] += Math.sin(Date.now()*0.001 + positions[i])*0.001;
        if (positions[i+1] > 3) positions[i+1] = 0;
      }
      this.mist.geometry.attributes.position.needsUpdate = true;
    }

    // Flicker fire
    if (this.fireLight) {
      this.fireLight.intensity = 0.8 + Math.sin(Date.now()*0.01)*0.2 + Math.random()*0.3;
    }

    // Item glow animation
    this.items.forEach(item => {
      if (item.mesh && !item.pickedUp) {
        item.mesh.rotation.y += dt;
        item.mesh.position.y = item.y + Math.sin(Date.now()*0.003)*0.1;
        if (item.light) {
          item.light.intensity = 0.3 + Math.sin(Date.now()*0.005)*0.2;
        }
      }
    });

    // Ambient events
    this.ambientTimer += dt;
    if (this.ambientTimer > 15 + Math.random()*20) {
      this.ambientTimer = 0;
      this.triggerAmbientEvent();
    }

    // Jump scare manager
    this.jumpscare.update(dt);

    // Render
    this.renderer.render(this.scene, this.camera);
  }

  triggerAmbientEvent() {
    const events = [
      () => {
        this.audio.playWhisper();
        this.audio.speak('Behind you...', false);
      },
      () => {
        this.jumpscare.triggerAmbient();
        this.player.sanity -= 5;
      },
      () => {
        // Shadow passes by
        const shadowGeo = new THREE.PlaneGeometry(3, 6);
        const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000, transparent: true, opacity: 0.7, side: THREE.DoubleSide });
        const shadow = new THREE.Mesh(shadowGeo, shadowMat);
        shadow.position.set(this.player.position.x + 5, 3, this.player.position.z);
        shadow.lookAt(this.player.position);
        this.scene.add(shadow);
        setTimeout(() => this.scene.remove(shadow), 500);
        this.audio.playNoise(0.5, 0.1);
        this.player.sanity -= 8;
      },
      () => {
        this.audio.playMonsterGrowl(10);
        this.audio.speak('It is getting closer.', false);
      },
      () => {
        // Footsteps behind
        this.audio.playFootstep(false, false);
        setTimeout(() => this.audio.playFootstep(false, false), 400);
        setTimeout(() => this.audio.playFootstep(false, false), 800);
      }
    ];
    const event = events[Math.floor(Math.random() * events.length)];
    event();
  }

  onResize() {
    this.camera.aspect = window.innerWidth / window.innerHeight;
    this.camera.updateProjectionMatrix();
    this.renderer.setSize(window.innerWidth, window.innerHeight);
  }

  pause() {
    this.isPaused = true;
    document.exitPointerLock();
  }

  resume() {
    this.isPaused = false;
    this.input.lockPointer();
  }
}

// ============ GAME FLOW ============
let game = null;

function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('gameover-screen').style.display = 'none';
  if (game) {
    // Reset
    location.reload();
    return;
  }
  game = new GameEngine();
  setTimeout(() => game.start(), 100);
}

function continueGame() {
  // Check for save
  const save = localStorage.getItem('darkwood-fps-save');
  if (save) {
    startGame();
    // Would restore state here
  } else {
    alert('No save data found.');
  }
}

// Button handlers
document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-continue').addEventListener('click', continueGame);
document.getElementById('btn-settings').addEventListener('click', () => {
  document.getElementById('settings-panel').style.display = 'block';
});
document.getElementById('btn-close-settings').addEventListener('click', () => {
  document.getElementById('settings-panel').style.display = 'none';
});
document.getElementById('btn-retry').addEventListener('click', () => {
  location.reload();
});
document.getElementById('btn-menu').addEventListener('click', () => {
  location.reload();
});

// Settings
document.getElementById('sens-slider').addEventListener('input', (e) => {
  if (game) game.input.setSensitivity(parseInt(e.target.value));
});
document.getElementById('vol-slider').addEventListener('input', (e) => {
  if (game) game.audio.setMasterVolume(parseInt(e.target.value));
});
document.getElementById('voice-slider').addEventListener('input', (e) => {
  if (game) game.audio.voiceVolume = parseInt(e.target.value) / 100;
});
document.getElementById('jumpscare-slider').addEventListener('input', (e) => {
  if (game) game.jumpscare.intensity = parseInt(e.target.value) / 100;
});

// Disable continue if no save
if (!localStorage.getItem('darkwood-fps-save')) {
  document.getElementById('btn-continue').disabled = true;
}

console.log('DARKWOOD FPS HORROR - Engine loaded');
console.log('Controls: WASD = Move, Shift = Run, Ctrl/C = Crouch, Space = Jump, F = Flashlight, E = Interact, Mouse = Look');
